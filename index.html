<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- React 18 -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;width:100%}
  body{background:#081624;color:#E0F2FE;font-family:'DM Mono','Fira Mono',monospace;overscroll-behavior:none}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0EA5E9;border-radius:2px}
  .btn{border:none;cursor:pointer;border-radius:7px;font-family:inherit;font-size:12px;padding:6px 14px;transition:all .15s;letter-spacing:.04em;font-weight:500}
  .btn-primary{background:#0EA5E9;color:#081624}.btn-primary:hover{background:#38BDF8}
  .btn-ghost{background:rgba(255,255,255,.05);color:#7DD3FC;border:1px solid rgba(125,211,252,.2)}.btn-ghost:hover{background:rgba(125,211,252,.12)}
  .btn-danger{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.2)}.btn-danger:hover{background:rgba(248,113,113,.22)}
  .inp{background:rgba(255,255,255,.06);border:1px solid rgba(125,211,252,.18);border-radius:7px;color:#E0F2FE;font-family:inherit;font-size:13px;padding:8px 10px;width:100%;outline:none;transition:border-color .2s}
  .inp:focus{border-color:#0EA5E9}.inp option{background:#0D2236}
  .icard{background:rgba(255,255,255,.04);border:1px solid rgba(125,211,252,.1);border-radius:10px;padding:11px 12px;transition:all .15s}
  .icard:hover{background:rgba(255,255,255,.07);border-color:rgba(125,211,252,.28)}
  .icard-green{border-color:rgba(52,211,153,.12)}.icard-green:hover{border-color:rgba(52,211,153,.32)}
  .qbtn{background:rgba(125,211,252,.1);border:1px solid rgba(125,211,252,.18);border-radius:4px;color:#7DD3FC;cursor:pointer;font-size:14px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .qbtn:hover{background:rgba(125,211,252,.26)}
  .zcell{border-radius:9px;cursor:pointer;transition:all .2s}.zcell:hover{filter:brightness(1.2)}
  .zcell.active{outline:2px solid rgba(125,211,252,.6);outline-offset:1px}
  .zcell-green.active{outline:2px solid rgba(52,211,153,.6)}
  .tab{border:none;cursor:pointer;border-radius:8px;font-family:inherit;font-size:13px;padding:7px 16px;transition:all .15s;font-weight:500;letter-spacing:.02em}
  .tab-on{background:rgba(125,211,252,.15);color:#BAE6FD;border:1px solid rgba(125,211,252,.3)}
  .tab-off{background:transparent;color:rgba(255,255,255,.35);border:1px solid transparent}.tab-off:hover{color:rgba(255,255,255,.6)}
  .lbl{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.pulse{animation:pulse 1.8s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite;display:inline-block}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.fadein{animation:fadein .2s ease}
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#0C1E30;border:1px solid rgba(125,211,252,.22);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
</style>
</head>
<body>

  <!-- Shown before React boots -->
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#7DD3FC;font-family:monospace">
    <div style="font-size:28px">❄</div>
    <div>Connecting to Freezer Vault…</div>
  </div>
</div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const db = window.__db;

// ── Config ─────────────────────────────────────────────────────────
const FREEZERS = {
  chest: {
    id:"chest", label:"Chest Freezer", icon:"🧊",
    zones:[
      {id:"basket",label:"Basket",        short:"BASKET",   color:"#BAE6FD",bg:"rgba(186,230,253,0.09)"},
      {id:"lt",    label:"Left · Top",    short:"LEFT TOP", color:"#7DD3FC",bg:"rgba(125,211,252,0.07)"},
      {id:"rt",    label:"Right · Top",   short:"RT TOP",   color:"#38BDF8",bg:"rgba(56,189,248,0.07)" },
      {id:"lb",    label:"Left · Bottom", short:"LEFT BOT", color:"#0EA5E9",bg:"rgba(14,165,233,0.07)" },
      {id:"rb",    label:"Right · Bottom",short:"RT BOT",   color:"#0284C7",bg:"rgba(2,132,199,0.07)"  },
    ]
  },
  indoor: {
    id:"indoor", label:"Indoor Freezer", icon:"❄️",
    zones:[
      {id:"l1",label:"Left · Drawer 1", short:"L · D1",color:"#A7F3D0",bg:"rgba(167,243,208,0.07)"},
      {id:"l2",label:"Left · Drawer 2", short:"L · D2",color:"#6EE7B7",bg:"rgba(110,231,183,0.07)"},
      {id:"l3",label:"Left · Drawer 3", short:"L · D3",color:"#34D399",bg:"rgba(52,211,153,0.07)" },
      {id:"l4",label:"Left · Drawer 4", short:"L · D4",color:"#10B981",bg:"rgba(16,185,129,0.07)" },
      {id:"r1",label:"Right · Drawer 1",short:"R · D1",color:"#A7F3D0",bg:"rgba(167,243,208,0.07)"},
      {id:"r2",label:"Right · Drawer 2",short:"R · D2",color:"#6EE7B7",bg:"rgba(110,231,183,0.07)"},
      {id:"r3",label:"Right · Drawer 3",short:"R · D3",color:"#34D399",bg:"rgba(52,211,153,0.07)" },
      {id:"r4",label:"Right · Drawer 4",short:"R · D4",color:"#10B981",bg:"rgba(16,185,129,0.07)" },
    ]
  }
};

const CATEGORIES = [
  "Cooked Meals","Hob Bags (uncooked)","Slow Cooker Bags","Proteins",
  "Grains & Carbs","Veg & Fruits","Soups & Broths","Sauces","Snacks","Other"
];

const todayStr = () => new Date().toISOString().split("T")[0];

// ── Freezer storage guidelines (months) ────────────────────────────
const STORAGE_GUIDE = [
  // Fish & seafood
  { keys:["salmon","trout","mackerel","sardine","tuna","herring"], months:3,  label:"oily fish" },
  { keys:["cod","haddock","plaice","sole","pollock","halibut","sea bass","sea bream","tilapia","whiting"], months:6, label:"white fish" },
  { keys:["prawn","shrimp","scallop","mussel","clam","squid","crab","lobster"], months:3, label:"shellfish" },
  // Poultry
  { keys:["chicken breast","chicken fillet"], months:9,  label:"chicken breast" },
  { keys:["whole chicken","whole turkey"], months:12, label:"whole poultry" },
  { keys:["chicken","turkey","duck","poultry","hen"], months:9,  label:"poultry" },
  // Beef
  { keys:["beef mince","minced beef","ground beef"], months:4,  label:"beef mince" },
  { keys:["beef","steak","brisket","short rib","oxtail"], months:9,  label:"beef" },
  // Lamb
  { keys:["lamb mince","minced lamb"], months:4, label:"lamb mince" },
  { keys:["lamb","mutton"], months:9,  label:"lamb" },
  // Pork
  { keys:["sausage","banger"], months:2,  label:"sausages" },
  { keys:["bacon","pancetta","lardons"], months:1,  label:"bacon/cured pork" },
  { keys:["pork mince","minced pork"], months:4, label:"pork mince" },
  { keys:["pork","ham","gammon"], months:6,  label:"pork" },
  // Other meat
  { keys:["mince","ground"], months:4, label:"mince" },
  { keys:["burger","patty"], months:4, label:"burgers" },
  // Cooked meals & leftovers
  { keys:["soup","broth","stock","chowder"], months:3, label:"soups & broths" },
  { keys:["curry","stew","casserole","tagine","ragu","bolognese","chilli","chili"], months:3, label:"cooked dishes" },
  { keys:["pasta","lasagne","lasagna","cannelloni"], months:3, label:"cooked pasta dishes" },
  { keys:["rice"], months:1, label:"cooked rice" },
  { keys:["pie","pastry"], months:3, label:"pies" },
  { keys:["bread","loaf","roll","bun","bagel"], months:1, label:"bread" },
  // Veg & fruit
  { keys:["spinach","kale","broccoli","cauliflower","pea","bean","sweetcorn","corn","carrot","parsnip","butternut","squash","courgette","pepper","leek","onion","mushroom"], months:12, label:"vegetables" },
  { keys:["tomato"], months:6, label:"tomatoes" },
  { keys:["berry","strawberr","raspberr","blueberr","blackberr","mango","pineapple","peach","plum","cherry","apple","banana"], months:12, label:"fruit" },
  // Dairy & eggs
  { keys:["butter"], months:6, label:"butter" },
  { keys:["cheese"], months:6, label:"hard cheese" },
  { keys:["egg"], months:12, label:"eggs (out of shell)" },
  { keys:["milk","cream"], months:3, label:"dairy" },
];

function suggestBestBefore(name, dateFrozen) {
  if (!name || name.length < 3) return null;
  const lower = name.toLowerCase();
  for (const entry of STORAGE_GUIDE) {
    if (entry.keys.some(k => lower.includes(k))) {
      const base = dateFrozen ? new Date(dateFrozen) : new Date();
      base.setMonth(base.getMonth() + entry.months);
      const dateStr = base.toISOString().split("T")[0];
      return { dateStr, months: entry.months, label: entry.label };
    }
  }
  return null;
}
const getZone  = (fid, zid) => FREEZERS[fid]?.zones.find(z => z.id === zid);

function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d).getTime() - Date.now()) / 86400000);
}
function expiryInfo(bb) {
  const d = daysUntil(bb);
  if (d === null) return null;
  if (d < 0)   return { label:`Expired ${Math.abs(d)}d ago`, color:"#F87171", pulse:true  };
  if (d === 0) return { label:"Expires today",               color:"#F87171", pulse:true  };
  if (d <= 7)  return { label:`${d}d left`,                  color:"#FB923C", pulse:true  };
  if (d <= 30) return { label:`${d}d left`,                  color:"#FDE68A", pulse:false };
  return             { label:`${d}d left`,                   color:"#4ADE80", pulse:false };
}
function frozenLabel(d) {
  if (!d) return "";
  const days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days === 0) return "frozen today";
  if (days === 1) return "frozen yesterday";
  return `frozen ${days}d ago`;
}
function fmtTime(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}) + " " +
         d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

const INIT = {
  name:"", freezer:"chest", zone:"basket", category:"Cooked Meals",
  bags:1, qty:1, unit:"portions", dateFrozen:todayStr(), bestBefore:"", notes:""
};

// ── App ─────────────────────────────────────────────────────────────
function App() {
  // Read URL params on load (for QR code deep links)
  const urlParams = new URLSearchParams(window.location.search);
  const initFreezer = FREEZERS[urlParams.get("freezer")] ? urlParams.get("freezer") : "chest";
  const initZone    = urlParams.get("zone") || null;

  const [items,      setItems]    = useState([]);
  const [dbError,    setDbError]  = useState(null);
  const [loading,    setLoading]  = useState(true);
  const [online,     setOnline]   = useState(navigator.onLine);
  const [syncing,    setSyncing]  = useState(false);
  const [lastUpd,    setLastUpd]  = useState(null);
  const [activeFreezer, setAF]    = useState(initFreezer);
  const [activeZone,    setAZ]    = useState(initZone);
  const [view,       setView]     = useState(initZone ? "map" : "map");
  const [kiosk,      setKiosk]    = useState(false);
  const [showForm,   setShowForm] = useState(false);
  const [form,       setForm]     = useState(INIT);
  const [editId,     setEditId]   = useState(null);
  const [search,     setSearch]   = useState("");
  const [filterCat,  setFilterCat]= useState("all");
  const [clock,      setClock]    = useState(new Date());

  useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    const on  = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener("online",  on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  }, []);

  // Firestore live listener
  useEffect(() => {
    if (!db) { setDbError("Database not initialised"); setLoading(false); return; }
    const unsub = db.collection("items")
      .onSnapshot(
        snap => {
          const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          // Sort by createdAt client-side to avoid needing a Firestore index
          docs.sort((a, b) => {
            const at = a.createdAt?.toMillis?.() ?? 0;
            const bt = b.createdAt?.toMillis?.() ?? 0;
            return at - bt;
          });
          setItems(docs);
          setLoading(false);
          if (docs.length > 0) {
            const latest = docs.reduce((a, b) => {
              const at = a.updatedAt?.toMillis?.() ?? 0;
              const bt = b.updatedAt?.toMillis?.() ?? 0;
              return bt > at ? b : a;
            });
            setLastUpd(latest.updatedAt ?? null);
          }
        },
        err => {
          console.error("Firestore snapshot error:", err);
          setDbError(err.message);
          setLoading(false);
        }
      );
    return () => unsub();
  }, []);

  async function saveItem() {
    if (!form.name.trim()) return;
    setSyncing(true);
    try {
      const payload = {
        name: form.name, freezer: form.freezer, zone: form.zone,
        category: form.category, bags: Number(form.bags)||1, qty: Number(form.qty), unit: form.unit,
        dateFrozen: form.dateFrozen, bestBefore: form.bestBefore || "",
        notes: form.notes || "",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      if (editId) {
        await db.collection("items").doc(editId).update(payload);
      } else {
        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection("items").add(payload);
      }
    } catch(e) { console.error("Save error:", e); alert("Save failed: " + e.message); }
    setSyncing(false);
    setShowForm(false); setEditId(null); setForm(INIT);
  }

  async function del(id) {
    setSyncing(true);
    try { await db.collection("items").doc(id).delete(); }
    catch(e) { console.error("Delete error:", e); }
    setSyncing(false);
  }

  async function adj(id, delta, currentBags) {
    const newBags = Math.max(0, currentBags + delta);
    setSyncing(true);
    try {
      if (newBags === 0) {
        await db.collection("items").doc(id).delete();
      } else {
        await db.collection("items").doc(id).update({
          bags: newBags,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    } catch(e) { console.error("Adjust error:", e); }
    setSyncing(false);
  }

  function matches(it) {
    const q = search.toLowerCase();
    return (it.name.toLowerCase().includes(q) || (it.notes||"").toLowerCase().includes(q))
      && (filterCat === "all" || it.category === filterCat);
  }
  const zoneItems = (fid, zid) => items.filter(it => it.freezer===fid && it.zone===zid && matches(it));
  const zoneExp   = (fid, zid) => items.filter(i  => i.freezer===fid && i.zone===zid && daysUntil(i.bestBefore)!==null && daysUntil(i.bestBefore)<=7).length;

  const allExpiring  = items.filter(it => { const d=daysUntil(it.bestBefore); return d!==null&&d<=7; });
  const totalPortions= items.reduce((s,i) => s+(Number(i.bags||1)*Number(i.qty)), 0);
  const fz = FREEZERS[activeFreezer];
  const panelZone  = activeZone ? getZone(activeFreezer, activeZone) : null;
  const panelItems = activeZone ? zoneItems(activeFreezer, activeZone) : [];

  function openAdd(zid) { setForm({...INIT, freezer:activeFreezer, zone:zid||fz.zones[0].id}); setEditId(null); setShowForm(true); }
  function openEdit(item) {
    setForm({ name:item.name, freezer:item.freezer, zone:item.zone, category:item.category||"Other",
      bags:item.bags||1, qty:item.qty, unit:item.unit, dateFrozen:item.dateFrozen||todayStr(), bestBefore:item.bestBefore||"", notes:item.notes||"" });
    setEditId(item.id); setShowForm(true);
  }

  const statusColor = online ? "#4ADE80" : "#FB923C";
  const statusLabel = !online ? "offline" : syncing ? "saving…" : "synced";

  // ── Error screen ──
  if (dbError) return (
    <div style={{padding:40,color:"#F87171",fontFamily:"monospace",lineHeight:1.8}}>
      <div style={{fontSize:20,marginBottom:12}}>⚠ Could not connect to database</div>
      <div style={{color:"rgba(255,255,255,.5)",marginBottom:16}}>{dbError}</div>
      <div style={{color:"rgba(255,255,255,.4)",fontSize:13}}>
        Check that:<br/>
        · You have internet access<br/>
        · Firestore is enabled in your Firebase console<br/>
        · The database rules allow read/write
      </div>
    </div>
  );

  // ── Loading screen ──
  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,color:"#7DD3FC"}}>
      <div style={{fontSize:36}} className="spin">↻</div>
      <div style={{fontSize:13}}>Connecting to Freezer Vault…</div>
    </div>
  );

  // ── Main UI ──
  return (
    <div style={{background:"linear-gradient(160deg,#081624 0%,#0C1F35 60%,#081A28 100%)",minHeight:"100vh",display:"flex",flexDirection:"column"}}>

      {/* STANDARD HEADER */}
      {!kiosk && (
        <div style={{padding:"13px 20px 10px",borderBottom:"1px solid rgba(125,211,252,.08)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,.25)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:50}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:16,color:"#BAE6FD",letterSpacing:"-.01em"}}>❄ FREEZER VAULT</span>
              <span style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:statusColor}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:statusColor,display:"inline-block"}}/>
                {syncing && <span className="spin" style={{fontSize:11}}>↻</span>}
                {statusLabel}
              </span>
            </div>
            <div style={{fontSize:10,color:"rgba(125,211,252,.5)",marginTop:2}}>
              {items.length} items · {totalPortions} portions
              {allExpiring.length>0 && <span style={{marginLeft:10,color:"#FB923C"}}>⚠ {allExpiring.length} expiring soon</span>}
              {lastUpd && <span style={{marginLeft:10,color:"rgba(255,255,255,.22)"}}>· updated {fmtTime(lastUpd)}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setKiosk(true)}>⛶ Kiosk</button>
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setView(v=>v==="map"?"list":"map")}>{view==="map"?"≡ List":"⊞ Map"}</button>
            <button className="btn btn-primary" onClick={()=>openAdd(activeZone)}>+ Add</button>
          </div>
        </div>
      )}

      {/* KIOSK HEADER */}
      {kiosk && (
        <div style={{padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(125,211,252,.08)",background:"rgba(0,0,0,.3)"}}>
          <div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:30,color:"#BAE6FD",letterSpacing:"-.02em",lineHeight:1}}>
              {clock.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}
            </div>
            <div style={{fontSize:11,color:"rgba(125,211,252,.4)",marginTop:3}}>
              {clock.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
            </div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
              <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:13,color:"#BAE6FD",letterSpacing:".05em"}}>❄ FREEZER VAULT</span>
              <span style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:statusColor}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:statusColor,display:"inline-block"}}/>
                {statusLabel}
              </span>
            </div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.28)",marginTop:2}}>{items.length} items · updated {fmtTime(lastUpd)}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {allExpiring.length>0 && (
              <div className="pulse" style={{background:"rgba(251,146,60,.15)",border:"1px solid rgba(251,146,60,.3)",borderRadius:8,padding:"6px 12px",fontSize:12,color:"#FB923C",fontWeight:600}}>
                ⚠ {allExpiring.length} expiring
              </div>
            )}
            <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setKiosk(false)}>✕ Exit</button>
            <button className="btn btn-primary" onClick={()=>openAdd(activeZone)}>+ Add</button>
          </div>
        </div>
      )}

      {/* EXPIRING PANEL */}
      {allExpiring.length>0 && (
        <div style={{padding:"9px 20px",background:"rgba(251,146,60,.06)",borderBottom:"1px solid rgba(251,146,60,.12)"}}>
          <div className="lbl" style={{color:"#FB923C",marginBottom:6,fontSize:9}}>Use This Week</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {[...allExpiring].sort((a,b)=>daysUntil(a.bestBefore)-daysUntil(b.bestBefore)).map(it=>{
              const ei   = expiryInfo(it.bestBefore);
              const zone = getZone(it.freezer, it.zone);
              return (
                <div key={it.id} style={{background:"rgba(0,0,0,.2)",border:`1px solid ${ei.color}30`,borderRadius:8,padding:"5px 10px",display:"flex",alignItems:"center",gap:7}}>
                  <span className={ei.pulse?"pulse":""} style={{fontSize:10,color:ei.color,fontWeight:600}}>{ei.label}</span>
                  <span style={{fontSize:11,color:"#E0F2FE"}}>{it.name}</span>
                  <span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{FREEZERS[it.freezer]?.icon} {zone?.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* FREEZER TABS */}
      <div style={{padding:"9px 20px 0",display:"flex",gap:6,background:"rgba(0,0,0,.1)",borderBottom:"1px solid rgba(125,211,252,.05)"}}>
        <button className={`tab ${activeFreezer==="overview"?"tab-on":"tab-off"}`}
          style={kiosk?{fontSize:14,padding:"8px 20px"}:{}}
          onClick={()=>{setAF("overview");setAZ(null);}}>
          📊 Overview
        </button>
        {Object.values(FREEZERS).map(f => (
          <button key={f.id} className={`tab ${activeFreezer===f.id?"tab-on":"tab-off"}`}
            style={kiosk?{fontSize:14,padding:"8px 20px"}:{}}
            onClick={()=>{setAF(f.id);setAZ(null);}}>
            {f.icon} {f.label}
          </button>
        ))}
      </div>

      {/* FILTERS */}
      {!kiosk && (
        <div style={{padding:"8px 20px",display:"flex",gap:8,flexWrap:"wrap",borderBottom:"1px solid rgba(125,211,252,.04)"}}>
          <input className="inp" placeholder="🔍 Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:165}}/>
          <select className="inp" value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:185}}>
            <option value="all">All Categories</option>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      )}

      {/* MAIN */}
      <div style={{padding:kiosk?"20px 24px":"15px 20px",flex:1,overflow:"auto"}}>

        {/* OVERVIEW */}
        {activeFreezer==="overview" && (
          <OverviewPanel items={items} allExpiring={allExpiring} totalPortions={totalPortions} expiryInfo={expiryInfo} getZone={getZone} CATEGORIES={CATEGORIES} FREEZERS={FREEZERS} daysUntil={daysUntil}/>
        )}

        {activeFreezer!=="overview" && view==="map" && (
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>

            {/* Diagram */}
            <div style={{flex:"0 0 auto"}}>
              <div className="lbl" style={{color:"rgba(125,211,252,.3)",marginBottom:9,fontSize:9}}>
                {fz.label} · {activeFreezer==="chest"?"Top View":"Front View"}
              </div>
              <div style={{border:"2px solid rgba(125,211,252,.18)",borderRadius:14,padding:8,background:"rgba(0,0,0,.2)",width:kiosk?350:290}}>
                {activeFreezer==="chest"
                  ? <ChestMap  fz={fz} zoneItems={zoneItems} zoneExp={zoneExp} activeZone={activeZone} setAZ={setAZ} kiosk={kiosk}/>
                  : <IndoorMap fz={fz} zoneItems={zoneItems} zoneExp={zoneExp} activeZone={activeZone} setAZ={setAZ} kiosk={kiosk}/>
                }
              </div>
              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:"4px 12px"}}>
                {[["#4ADE80",">30d"],["#FDE68A","7–30d"],["#FB923C","<7d"],["#F87171","expired"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:c}}/>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{l}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Detail panel */}
            <div style={{flex:1,minWidth:220}} className="fadein">
              {panelZone ? (
                <>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,borderRadius:3,background:panelZone.color}}/>
                      <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:kiosk?16:14,color:panelZone.color}}>{panelZone.label}</span>
                      <span style={{fontSize:11,color:"rgba(255,255,255,.28)"}}>{panelItems.length} item{panelItems.length!==1?"s":""}</span>
                    </div>
                    <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openAdd(activeZone)}>+ Add here</button>
                  </div>
                  {panelItems.length===0
                    ? <div style={{textAlign:"center",padding:"36px 0",color:"rgba(255,255,255,.18)",fontSize:12,fontStyle:"italic"}}>Empty</div>
                    : <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {panelItems.map(it=>(
                          <ItemCard key={it.id} item={it} zone={panelZone} kiosk={kiosk} isGreen={activeFreezer==="indoor"}
                            onEdit={()=>openEdit(it)} onDel={()=>del(it.id)} onAdj={d=>adj(it.id,d,it.bags||1)}/>
                        ))}
                      </div>
                  }
                </>
              ) : (
                <div style={{textAlign:"center",padding:kiosk?"70px 0":"50px 0",color:"rgba(255,255,255,.16)",fontSize:kiosk?14:12}}>
                  <div style={{fontSize:kiosk?32:24,marginBottom:10,opacity:.3}}>☝️</div>
                  Tap a zone on the map
                </div>
              )}
            </div>
          </div>
        )}

        {activeFreezer!=="overview" && view==="list" && (
          /* LIST VIEW */
          <div>
            {fz.zones.map(zone => {
              const zi = zoneItems(fz.id, zone.id);
              return (
                <div key={zone.id} style={{marginBottom:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:3,background:zone.color,flexShrink:0}}/>
                    <span className="lbl" style={{color:zone.color}}>{zone.label}</span>
                    <div style={{flex:1,height:1,background:`${zone.color}22`,marginLeft:4}}/>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.22)"}}>{zi.length}</span>
                  </div>
                  {zi.length===0
                    ? <div style={{fontSize:11,color:"rgba(255,255,255,.16)",fontStyle:"italic",paddingLeft:18}}>Empty</div>
                    : <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {zi.map(it=>(
                          <ItemCard key={it.id} item={it} zone={zone} isGreen={activeFreezer==="indoor"}
                            onEdit={()=>openEdit(it)} onDel={()=>del(it.id)} onAdj={d=>adj(it.id,d,it.bags||1)}/>
                        ))}
                      </div>
                  }
                </div>
              );
            })}
            {items.filter(it=>it.freezer===activeFreezer).length===0 && (
              <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.18)",fontSize:12}}>No items in this freezer yet</div>
            )}
          </div>
        )}
      </div>

      {/* MODAL */}
      {showForm && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget){setShowForm(false);setEditId(null);}}}>
          <div className="modal">
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:16,marginBottom:18,color:"#BAE6FD"}}>
              {editId?"Edit Item":"Add to Freezer"}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <Field label="NAME">
                <input className="inp" placeholder="e.g. Beef Brisket Dump Bag" value={form.name}
                  onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/>
              </Field>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="FREEZER">
                  <select className="inp" value={form.freezer} onChange={e=>{
                    const nf=e.target.value;
                    setForm(f=>({...f,freezer:nf,zone:FREEZERS[nf].zones[0].id}));
                  }}>
                    {Object.values(FREEZERS).map(f=><option key={f.id} value={f.id}>{f.icon} {f.label}</option>)}
                  </select>
                </Field>
                <Field label="ZONE">
                  <select className="inp" value={form.zone} onChange={e=>setForm(f=>({...f,zone:e.target.value}))}>
                    {FREEZERS[form.freezer].zones.map(z=><option key={z.id} value={z.id}>{z.label}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="CATEGORY">
                <select className="inp" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                  {CATEGORIES.map(c=><option key={c}>{c}</option>)}
                </select>
              </Field>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                <Field label="BAGS">
                  <input className="inp" type="number" min="1" value={form.bags}
                    onChange={e=>setForm(f=>({...f,bags:Number(e.target.value)}))}/>
                </Field>
                <Field label="PORTIONS / BAG">
                  <input className="inp" type="number" min="1" value={form.qty}
                    onChange={e=>setForm(f=>({...f,qty:Number(e.target.value)}))}/>
                </Field>
                <Field label="UNIT">
                  <input className="inp" placeholder="portions / g" value={form.unit}
                    onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/>
                </Field>
              </div>
              {(form.bags > 1 || form.qty > 1) && (
                <div style={{fontSize:11,color:"rgba(125,211,252,.5)",marginTop:-4}}>
                  = {form.bags} bag{form.bags!==1?"s":""} × {form.qty} {form.unit} = {form.bags*form.qty} {form.unit} total
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="DATE FROZEN">
                  <input className="inp" type="date" value={form.dateFrozen}
                    onChange={e=>setForm(f=>({...f,dateFrozen:e.target.value}))}/>
                </Field>
                <Field label="BEST BEFORE">
                  <input className="inp" type="date" value={form.bestBefore}
                    onChange={e=>setForm(f=>({...f,bestBefore:e.target.value}))}/>
                  {(()=>{
                    const s = suggestBestBefore(form.name, form.dateFrozen);
                    if (!s || form.bestBefore) return null;
                    return (
                      <div
                        onClick={()=>setForm(f=>({...f,bestBefore:s.dateStr}))}
                        style={{marginTop:6,cursor:"pointer",background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.25)",borderRadius:6,padding:"5px 9px",fontSize:11,color:"#7DD3FC",display:"flex",alignItems:"center",gap:6,transition:"background .15s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.2)"}
                        onMouseLeave={e=>e.currentTarget.style.background="rgba(56,189,248,.1)"}>
                        <span>💡</span>
                        <span>{s.label} keeps ~{s.months} month{s.months!==1?"s":""} → <strong>{new Date(s.dateStr).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</strong></span>
                      </div>
                    );
                  })()}
                </Field>
              </div>
              {form.bestBefore && (()=>{
                const ei=expiryInfo(form.bestBefore);
                return ei ? <div style={{background:`${ei.color}18`,border:`1px solid ${ei.color}44`,borderRadius:7,padding:"7px 12px",fontSize:12,color:ei.color}}>{ei.label}</div> : null;
              })()}
              <Field label="NOTES (optional)">
                <input className="inp" placeholder="e.g. ×2 servings, labelled A…" value={form.notes}
                  onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
              </Field>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button className="btn btn-primary" style={{flex:1,padding:"9px"}} onClick={saveItem}>{editId?"Save Changes":"Add Item"}</button>
                <button className="btn btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Sub-components ──────────────────────────────────────────────────
function ChestMap({fz,zoneItems,zoneExp,activeZone,setAZ,kiosk}) {
  const z = id => fz.zones.find(z=>z.id===id);
  return (<>
    <div style={{display:"grid",gridTemplateColumns:"1fr 72px",gap:6,marginBottom:6}}>
      <div style={{background:"rgba(255,255,255,.015)",border:"1px dashed rgba(255,255,255,.06)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 0"}}>
        <span style={{fontSize:9,color:"rgba(255,255,255,.13)",letterSpacing:".06em"}}>OPEN</span>
      </div>
      <ZCell zone={z("basket")} count={zoneItems(fz.id,"basket").length} exp={zoneExp(fz.id,"basket")} active={activeZone==="basket"} onClick={()=>setAZ(a=>a==="basket"?null:"basket")} kiosk={kiosk}/>
    </div>
    <div style={{height:1,background:"rgba(125,211,252,.1)",margin:"2px 0 6px"}}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
      <ZCell zone={z("lt")} count={zoneItems(fz.id,"lt").length} exp={zoneExp(fz.id,"lt")} active={activeZone==="lt"} onClick={()=>setAZ(a=>a==="lt"?null:"lt")} kiosk={kiosk}/>
      <ZCell zone={z("rt")} count={zoneItems(fz.id,"rt").length} exp={zoneExp(fz.id,"rt")} active={activeZone==="rt"} onClick={()=>setAZ(a=>a==="rt"?null:"rt")} kiosk={kiosk}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      <ZCell zone={z("lb")} count={zoneItems(fz.id,"lb").length} exp={zoneExp(fz.id,"lb")} active={activeZone==="lb"} onClick={()=>setAZ(a=>a==="lb"?null:"lb")} kiosk={kiosk}/>
      <ZCell zone={z("rb")} count={zoneItems(fz.id,"rb").length} exp={zoneExp(fz.id,"rb")} active={activeZone==="rb"} onClick={()=>setAZ(a=>a==="rb"?null:"rb")} kiosk={kiosk}/>
    </div>
  </>);
}

function IndoorMap({fz,zoneItems,zoneExp,activeZone,setAZ,kiosk}) {
  const rows = [["l1","r1"],["l2","r2"],["l3","r3"],["l4","r4"]];
  const z = id => fz.zones.find(z=>z.id===id);
  return (<>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:4}}>
      {["LEFT DOOR","RIGHT DOOR"].map(l=>(
        <div key={l} style={{textAlign:"center",fontSize:9,color:"rgba(52,211,153,.38)",letterSpacing:".07em",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,padding:"3px 0"}}>{l}</div>
      ))}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {rows.map(([lid,rid])=>(
        <div key={lid} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <ZCell zone={z(lid)} count={zoneItems(fz.id,lid).length} exp={zoneExp(fz.id,lid)} active={activeZone===lid} onClick={()=>setAZ(a=>a===lid?null:lid)} kiosk={kiosk} isGreen/>
          <ZCell zone={z(rid)} count={zoneItems(fz.id,rid).length} exp={zoneExp(fz.id,rid)} active={activeZone===rid} onClick={()=>setAZ(a=>a===rid?null:rid)} kiosk={kiosk} isGreen/>
        </div>
      ))}
    </div>
  </>);
}

function ZCell({zone,count,active,onClick,exp,kiosk,isGreen}) {
  return (
    <div className={`zcell${active?(isGreen?" zcell-green active":" active"):""}`}
      style={{background:zone.bg,border:`1px solid ${zone.color}28`,padding:kiosk?"11px 12px":"8px 10px",minHeight:kiosk?72:58}}
      onClick={onClick}>
      <div style={{fontSize:9,letterSpacing:".08em",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:zone.color,opacity:.72,marginBottom:5}}>{zone.short}</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:kiosk?26:19,fontWeight:500,color:zone.color,lineHeight:1}}>{count}</span>
        {exp>0 && <span className="pulse" style={{fontSize:9,background:"rgba(251,146,60,.18)",color:"#FB923C",border:"1px solid rgba(251,146,60,.3)",borderRadius:10,padding:"2px 6px",fontWeight:600}}>⚠{exp}</span>}
      </div>
    </div>
  );
}

function ItemCard({item,zone,onEdit,onDel,onAdj,kiosk,isGreen}) {
  const [hover,setHover] = useState(false);
  const ei = expiryInfo(item.bestBefore);
  return (
    <div className={`icard${isGreen?" icard-green":""}`} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:kiosk?15:13,fontWeight:500,color:"#E0F2FE"}}>{item.name}</span>
            {ei && <span className={ei.pulse?"pulse":""} style={{fontSize:10,color:ei.color,background:`${ei.color}18`,border:`1px solid ${ei.color}33`,borderRadius:10,padding:"1px 7px",flexShrink:0}}>{ei.label}</span>}
          </div>
          <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:isGreen?"#6EE7B7":"#64B5D9"}}>
              {item.bags||1} bag{(item.bags||1)!==1?"s":""}
              {item.qty>1 && <span style={{color:"rgba(255,255,255,.35)"}}> × {item.qty} {item.unit}</span>}
              {item.qty===1 && <span style={{color:"rgba(255,255,255,.35)"}}> · {item.unit}</span>}
            </span>
            <span style={{color:"rgba(255,255,255,.18)",fontSize:10}}>·</span>
            <span style={{fontSize:10,background:`${zone.color}18`,color:zone.color,borderRadius:10,padding:"1px 7px"}}>{item.category}</span>
            {item.dateFrozen && <><span style={{color:"rgba(255,255,255,.18)",fontSize:10}}>·</span><span style={{fontSize:10,color:"rgba(255,255,255,.28)"}}>{frozenLabel(item.dateFrozen)}</span></>}
          </div>
          {item.notes && <div style={{fontSize:11,color:"rgba(255,255,255,.26)",marginTop:4,fontStyle:"italic"}}>{item.notes}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
          <div style={{display:"flex",gap:4}}>
            <button className="qbtn" onClick={()=>onAdj(-1)}>−</button>
            <button className="qbtn" onClick={()=>onAdj(1)}>+</button>
          </div>
          {hover && (
            <div style={{display:"flex",gap:4}}>
              <button className="btn btn-ghost" style={{padding:"3px 8px",fontSize:10}} onClick={onEdit}>edit</button>
              <button className="btn btn-danger" style={{padding:"3px 8px",fontSize:10}} onClick={onDel}>×</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Field({label,children}) {
  return (
    <div>
      <div style={{fontSize:10,color:"#7DD3FC",letterSpacing:".08em",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,marginBottom:5}}>{label}</div>
      {children}
    </div>
  );
}

function OverviewPanel({items, allExpiring, totalPortions, expiryInfo, getZone, CATEGORIES, FREEZERS, daysUntil}) {
  const totalBags = items.reduce((s,i) => s + Number(i.bags||1), 0);

  // Per-freezer stats
  const freezerStats = Object.values(FREEZERS).map(fz => {
    const fzItems = items.filter(i => i.freezer === fz.id);
    const fzPortions = fzItems.reduce((s,i) => s + (Number(i.bags||1)*Number(i.qty)), 0);
    const fzExpiring = fzItems.filter(i => { const d=daysUntil(i.bestBefore); return d!==null&&d<=7; }).length;
    return { fz, count: fzItems.length, portions: fzPortions, expiring: fzExpiring };
  });

  // Category breakdown across all freezers
  const catCounts = CATEGORIES.map(cat => ({
    cat,
    count: items.filter(i => i.category === cat).length,
    portions: items.filter(i => i.category === cat).reduce((s,i) => s+(Number(i.bags||1)*Number(i.qty)), 0)
  })).filter(c => c.count > 0).sort((a,b) => b.count - a.count);

  // Zone breakdown per freezer
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Top stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {[
          {label:"Total Items",  value:items.length,   sub:"across all freezers"},
          {label:"Total Bags",   value:totalBags,       sub:"individual containers"},
          {label:"Total Portions",value:totalPortions,  sub:"combined"},
        ].map(({label,value,sub}) => (
          <div key={label} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.1)",borderRadius:12,padding:"14px 16px"}}>
            <div className="lbl" style={{color:"rgba(125,211,252,.45)",fontSize:9,marginBottom:6}}>{label}</div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:28,color:"#BAE6FD",lineHeight:1}}>{value}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.28)",marginTop:4}}>{sub}</div>
          </div>
        ))}
      </div>

      {/* Per-freezer breakdown */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {freezerStats.map(({fz,count,portions,expiring}) => (
          <div key={fz.id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.1)",borderRadius:12,padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:13,color:"#BAE6FD"}}>{fz.icon} {fz.label}</div>
              {expiring>0 && <span className="pulse" style={{fontSize:10,color:"#FB923C",background:"rgba(251,146,60,.15)",border:"1px solid rgba(251,146,60,.3)",borderRadius:10,padding:"2px 8px"}}>⚠ {expiring} expiring</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[["Items",count],["Portions",portions]].map(([l,v])=>(
                <div key={l}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginBottom:2}}>{l}</div>
                  <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:20,color:"#7DD3FC"}}>{v}</div>
                </div>
              ))}
            </div>
            {/* Zone mini-grid */}
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {fz.zones.map(zone => {
                const zCount = items.filter(i=>i.freezer===fz.id&&i.zone===zone.id).length;
                if (zCount === 0) return null;
                return (
                  <div key={zone.id} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:7,height:7,borderRadius:2,background:zone.color,flexShrink:0}}/>
                    <div style={{flex:1,fontSize:11,color:"rgba(255,255,255,.45)"}}>{zone.label}</div>
                    <div style={{fontSize:11,color:zone.color,fontWeight:500}}>{zCount}</div>
                    <div style={{width:60,height:4,background:"rgba(255,255,255,.06)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",background:zone.color,width:`${Math.min(100,(zCount/Math.max(1,items.filter(i=>i.freezer===fz.id).length))*100)}%`,borderRadius:2,opacity:.7}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* Category breakdown */}
      {catCounts.length > 0 && (
        <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.1)",borderRadius:12,padding:"14px 16px"}}>
          <div className="lbl" style={{color:"rgba(125,211,252,.45)",fontSize:9,marginBottom:12}}>By Category</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {catCounts.map(({cat,count,portions}) => {
              const pct = Math.min(100,(count/Math.max(1,items.length))*100);
              return (
                <div key={cat} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:130,fontSize:11,color:"rgba(255,255,255,.5)",flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cat}</div>
                  <div style={{flex:1,height:5,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",background:"linear-gradient(90deg,#0EA5E9,#38BDF8)",width:`${pct}%`,borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:11,color:"#7DD3FC",width:20,textAlign:"right",flexShrink:0}}>{count}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.3)",width:70,flexShrink:0}}>{portions} portions</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Empty state */}
      {items.length===0 && (
        <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.18)",fontSize:12}}>No items in any freezer yet</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
