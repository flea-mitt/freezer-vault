function HistoryPanel({db, FREEZERS, getZone}) {
  const [entries,  setEntries]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [hasMore,  setHasMore]  = useState(false);
  const [lastDoc,  setLastDoc]  = useState(null);
  const PAGE = 30;

  useEffect(() => {
    setLoading(true);
    db.collection("history")
      .orderBy("timestamp", "desc")
      .limit(PAGE)
      .get()
      .then(snap => {
        const docs = snap.docs.map(d => ({id:d.id,...d.data()}));
        setEntries(docs);
        setHasMore(snap.docs.length === PAGE);
        setLastDoc(snap.docs[snap.docs.length-1] || null);
        setLoading(false);
      })
      .catch(e => { console.error("History error:", e); setLoading(false); });
  }, []);

  async function loadMore() {
    if (!lastDoc) return;
    const snap = await db.collection("history")
      .orderBy("timestamp", "desc")
      .startAfter(lastDoc)
      .limit(PAGE)
      .get();
    const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
    setEntries(p => [...p, ...docs]);
    setHasMore(snap.docs.length === PAGE);
    setLastDoc(snap.docs[snap.docs.length-1] || null);
  }

  const ACTION_META = {
    added:        { label:"Added",         color:"#4ADE80", icon:"＋" },
    removed:      { label:"Removed",       color:"#F87171", icon:"−" },
    edited:       { label:"Edited",        color:"#FDE68A", icon:"✎" },
    bags_added:      { label:"Bags added",       color:"#7DD3FC", icon:"↑" },
    bags_removed:    { label:"Bags removed",     color:"#FB923C", icon:"↓" },
    portions_added:  { label:"Portions added",   color:"#7DD3FC", icon:"↑" },
    portions_removed:{ label:"Portions removed", color:"#FB923C", icon:"↓" },
  };

  function fmtTs(ts) {
    if (!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1)   return "just now";
    if (diff < 60)  return `${diff}m ago`;
    if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
    return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:diff>525600?"numeric":undefined}) + " " +
           d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"44px 0",color:"#7DD3FC",gap:10}}>
      <span className="spin">↻</span> Loading history…
    </div>
  );

  if (entries.length === 0) return (
    <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.2)",fontSize:12}}>
      <div style={{fontSize:28,marginBottom:10,opacity:.3}}>📋</div>
      No history yet — actions will appear here as you use the app
    </div>
  );

  // Group entries by date
  const grouped = [];
  let currentDate = null;
  for (const entry of entries) {
    const d    = entry.timestamp?.toDate?.() || new Date();
    const date = d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    if (date !== currentDate) { grouped.push({type:"date",label:date}); currentDate = date; }
    grouped.push({type:"entry",entry});
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:2,maxWidth:700}}>
      {grouped.map((row,i) => {
        if (row.type === "date") return (
          <div key={i} style={{fontSize:10,color:"rgba(255,255,255,.25)",letterSpacing:".06em",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,padding:"14px 0 6px",textTransform:"uppercase"}}>
            {row.label}
          </div>
        );

        const {entry} = row;
        const meta    = ACTION_META[entry.action] || {label:entry.action, color:"#7DD3FC", icon:"•"};
        const fz      = FREEZERS[entry.freezer];
        const zone    = getZone(entry.freezer, entry.zone);

        return (
          <div key={entry.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 12px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(125,211,252,.07)",borderRadius:9,transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.06)"}
            onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"}>

            {/* Action badge */}
            <div style={{width:28,height:28,borderRadius:8,background:`${meta.color}18`,border:`1px solid ${meta.color}33`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:13,color:meta.color,fontWeight:700}}>
              {meta.icon}
            </div>

            {/* Content */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:meta.color,fontWeight:600}}>{meta.label}</span>
                <span style={{fontSize:13,color:"#E0F2FE",fontWeight:500}}>{entry.itemName}</span>
                {entry.action==="bags_added"        && <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>({entry.from} → {entry.to} bags)</span>}
                {entry.action==="bags_removed"      && <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>({entry.from} → {entry.to} bags)</span>}
                {entry.action==="portions_added"    && <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>({entry.from} → {entry.to} portions)</span>}
                {entry.action==="portions_removed"  && <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>({entry.from} → {entry.to} portions)</span>}
                {entry.note && <span style={{fontSize:11,color:"rgba(255,255,255,.35)",fontStyle:"italic"}}>{entry.note}</span>}
              </div>
              <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                {fz && <span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{fz.icon} {fz.label}{zone?` · ${zone.label}`:""}</span>}
                {entry.category && <><span style={{color:"rgba(255,255,255,.15)",fontSize:10}}>·</span><span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{entry.category}</span></>}
                {entry.bags && entry.action==="added" && <><span style={{color:"rgba(255,255,255,.15)",fontSize:10}}>·</span><span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{entry.bags} bag{entry.bags!==1?"s":""}</span></>}
              </div>
            </div>

            {/* Right side: user + time */}
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{entry.performedBy}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.25)",marginTop:2}}>{fmtTs(entry.timestamp)}</div>
            </div>
          </div>
        );
      })}

      {hasMore && (
        <button className="btn btn-ghost" style={{marginTop:10,alignSelf:"center"}} onClick={loadMore}>
          Load more
        </button>
      )}
    </div>
  );
}

function MealPlanPanel({db, items, person1Name, person2Name, isOwner}) {
  const [weekStart, setWeekStart] = useState(() => getWeekMonday(new Date()));
  const [days, setDays] = useState({});
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editCell, setEditCell] = useState(null); // {dayIdx, person, slot}
  const [editText, setEditText] = useState("");
  const [editItemId, setEditItemId] = useState("");
  const [editMode, setEditMode] = useState("text");

  const SLOTS = [{key:"b",label:"Breakfast"},{key:"l",label:"Lunch"},{key:"d",label:"Dinner"}];
  const weekKey = weekStart.toISOString().split("T")[0];

  function normalizeSlot(val) {
    if (!val) return [];
    return Array.isArray(val) ? val : [val];
  }

  useEffect(() => {
    setLoading(true);
    db.collection("mealPlan").doc(weekKey).get()
      .then(snap => { setDays(snap.exists ? (snap.data().days || {}) : {}); setLoading(false); })
      .catch(() => setLoading(false));
  }, [weekKey]);

  async function saveDays(updated) {
    setSaving(true);
    try {
      await db.collection("mealPlan").doc(weekKey).set({weekStart: weekKey, days: updated}, {merge: true});
      setDays(updated);
    } catch(e) { console.warn("Meal plan save failed:", e); }
    setSaving(false);
  }

  function openAdd(dayIdx, person, slot) {
    if (!isOwner) return;
    setEditCell({dayIdx, person, slot});
    setEditText(""); setEditItemId(""); setEditMode("text");
  }

  function removeItem(dayIdx, person, slot, idx) {
    if (!isOwner) return;
    const updated = {...days};
    const day = {...(updated[dayIdx] || {})};
    const personData = {...(day[person] || {})};
    const arr = normalizeSlot(personData[slot]).filter((_,i) => i !== idx);
    if (arr.length === 0) delete personData[slot];
    else personData[slot] = arr;
    day[person] = personData;
    updated[dayIdx] = day;
    saveDays(updated);
  }

  function saveEdit() {
    if (!editCell) return;
    const {dayIdx, person, slot} = editCell;
    let meal;
    if (editMode === "item" && editItemId) {
      const it = items.find(i => i.id === editItemId);
      meal = {itemId: editItemId, label: it ? it.name : editItemId};
    } else if (editText.trim()) {
      meal = {label: editText.trim()};
    } else return;
    const updated = {...days};
    const day = {...(updated[dayIdx] || {})};
    const personData = {...(day[person] || {})};
    personData[slot] = [...normalizeSlot(personData[slot]), meal];
    day[person] = personData;
    updated[dayIdx] = day;
    saveDays(updated);
    setEditCell(null);
  }

  const weekDays = Array.from({length: 7}, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return d;
  });
  const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const today = new Date().toDateString();

  function prevWeek() { const d = new Date(weekStart); d.setDate(d.getDate()-7); setWeekStart(d); }
  function nextWeek() { const d = new Date(weekStart); d.setDate(d.getDate()+7); setWeekStart(d); }
  function goToday()  { setWeekStart(getWeekMonday(new Date())); }

  const p1Color = "#7DD3FC"; const p2Color = "#34D399";
  const editSlotLabel = editCell ? SLOTS.find(s=>s.key===editCell.slot)?.label : "";
  const editPersonName = editCell ? (editCell.person==="p1"?person1Name:person2Name) : "";

  // Build defrost schedule: for each freezer item in the plan, take out 1 day before
  const localDateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayIso = localDateStr(new Date());
  const defrostMap = {};
  weekDays.forEach((d, i) => {
    const dayData = days[i] || {};
    SLOTS.forEach(slot => {
      ["p1","p2"].forEach(person => {
        normalizeSlot(dayData[person]?.[slot.key]).forEach(m => {
          if (!m.itemId) return;
          const defrost = new Date(d);
          defrost.setDate(defrost.getDate() - 1);
          const key = localDateStr(defrost);
          if (!defrostMap[key]) defrostMap[key] = [];
          defrostMap[key].push({
            itemName: m.label,
            forDay: DAY_NAMES[i],
            slotLabel: slot.label,
            personName: person==="p1" ? person1Name : person2Name,
            defrostDate: defrost,
          });
        });
      });
    });
  });
  const defrostEntries = Object.entries(defrostMap)
    .filter(([k]) => k >= todayIso)
    .sort(([a],[b]) => a.localeCompare(b));

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button className="btn btn-ghost" style={{padding:"4px 12px",fontSize:12}} onClick={prevWeek}>← Prev</button>
        <button className="btn btn-ghost" style={{padding:"4px 12px",fontSize:12}} onClick={goToday}>Today</button>
        <span style={{fontSize:13,color:"#BAE6FD",fontFamily:"'Space Grotesk',sans-serif",fontWeight:600}}>
          Week of {weekStart.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
        </span>
        <button className="btn btn-ghost" style={{padding:"4px 12px",fontSize:12}} onClick={nextWeek}>Next →</button>
        {saving && <span style={{fontSize:11,color:"rgba(125,211,252,.5)"}}>saving…</span>}
        {loading && <span style={{fontSize:11,color:"rgba(125,211,252,.5)"}}>loading…</span>}
      </div>

      {/* Defrost schedule */}
      {defrostEntries.length > 0 && (
        <div style={{marginBottom:20,background:"rgba(251,146,60,.06)",border:"1px solid rgba(251,146,60,.18)",borderRadius:12,padding:"14px 16px"}}>
          <div className="lbl" style={{color:"#FB923C",fontSize:9,marginBottom:12}}>Take out of freezer</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {defrostEntries.map(([dateStr, entries]) => {
              const isDefrostToday = dateStr === todayIso;
              const label = isDefrostToday ? "Today" : entries[0].defrostDate.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"short"});
              return (
                <div key={dateStr} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{flexShrink:0,minWidth:80,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:11,color:isDefrostToday?"#FB923C":"#FDE68A",paddingTop:1}}>{label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {entries.map((e,ei)=>(
                      <div key={ei} style={{fontSize:11,background:"rgba(251,146,60,.1)",border:"1px solid rgba(251,146,60,.22)",borderRadius:8,padding:"3px 10px",color:"#FED7AA"}}>
                        {e.itemName}
                        <span style={{color:"rgba(255,255,255,.35)",marginLeft:5,fontSize:10}}>for {e.forDay} {e.slotLabel.toLowerCase()}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 7-day grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8,minWidth:760}}>
        {weekDays.map((d, i) => {
          const dayData = days[i] || {};
          const isToday = d.toDateString() === today;
          return (
            <div key={i} style={{background:isToday?"rgba(14,165,233,.08)":"rgba(255,255,255,.03)",border:`1px solid ${isToday?"rgba(14,165,233,.35)":"rgba(125,211,252,.1)"}`,borderRadius:10,padding:"10px 8px"}}>
              <div style={{marginBottom:10}}>
                <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:12,color:isToday?"#7DD3FC":"#BAE6FD"}}>{DAY_NAMES[i]}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{d.getDate()}/{d.getMonth()+1}</div>
              </div>

              {SLOTS.map(slot => {
                return (
                  <div key={slot.key} style={{marginBottom:8}}>
                    <div style={{fontSize:8,color:"rgba(255,255,255,.22)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:4}}>{slot.label}</div>
                    {["p1","p2"].map(person => {
                      const color = person==="p1" ? p1Color : p2Color;
                      const pName = person==="p1" ? person1Name : person2Name;
                      const mealArr = normalizeSlot(dayData[person]?.[slot.key]);
                      const slotKcal = mealArr.reduce((sum,m) => {
                        if (!m.itemId) return sum;
                        const cal = Number(items.find(it=>it.id===m.itemId)?.calories||0);
                        return sum + cal;
                      }, 0);
                      return (
                        <div key={person} style={{marginBottom:4}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                            <div style={{fontSize:8,color:`${color}55`}}>{pName}</div>
                            {slotKcal > 0 && <div style={{fontSize:8,color:`${color}70`}}>{slotKcal} kcal</div>}
                          </div>
                          {mealArr.map((m,mi)=>(
                            <div key={mi} style={{fontSize:10,background:`${color}10`,border:`1px solid ${color}20`,borderRadius:5,padding:"2px 5px",marginBottom:2,display:"flex",gap:3,alignItems:"center"}}>
                              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"rgba(255,255,255,.8)"}}>{m.label}</span>
                              {isOwner && <span onClick={()=>removeItem(i,person,slot.key,mi)} style={{cursor:"pointer",color:"rgba(248,113,113,.45)",flexShrink:0,lineHeight:1,fontSize:11}}>×</span>}
                            </div>
                          ))}
                          {isOwner && (
                            <div onClick={()=>openAdd(i,person,slot.key)} style={{fontSize:9,color:`${color}38`,border:`1px dashed ${color}22`,borderRadius:5,padding:"1px 5px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>+ add</div>
                          )}
                        </div>
                      );
                    })}
                    {slot.key !== "d" && <div style={{height:1,background:"rgba(255,255,255,.05)",marginTop:6}}/>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Add meal modal */}
      {editCell && (
        <div className="overlay" onClick={()=>setEditCell(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,marginBottom:4,color:"#BAE6FD"}}>{editSlotLabel}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginBottom:14}}>{DAY_NAMES[editCell.dayIdx]} · {editPersonName}</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button className={`btn ${editMode==="text"?"btn-primary":"btn-ghost"}`} style={{flex:1}} onClick={()=>setEditMode("text")}>Free text</button>
              <button className={`btn ${editMode==="item"?"btn-primary":"btn-ghost"}`} style={{flex:1}} onClick={()=>setEditMode("item")}>Freezer item</button>
            </div>
            {editMode==="text" ? (
              <input className="inp" placeholder="What's for this meal?" value={editText} onChange={e=>setEditText(e.target.value)}
                autoFocus onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
            ) : (
              <select className="inp" value={editItemId} onChange={e=>setEditItemId(e.target.value)}>
                <option value="">— pick a freezer item —</option>
                {[...items].sort((a,b)=>a.name.localeCompare(b.name)).map(it=>(
                  <option key={it.id} value={it.id}>{it.name} ({FREEZERS[it.freezer]?.label || it.freezer})</option>
                ))}
              </select>
            )}
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button className="btn btn-primary" style={{flex:1}} onClick={saveEdit}>Add</button>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setEditCell(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AddToMealModal({db, item, person1Name, person2Name, onClose}) {
  const SLOTS = [{key:"b",label:"Breakfast"},{key:"l",label:"Lunch"},{key:"d",label:"Dinner"}];
  const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const todayDayIdx = () => { const day=new Date().getDay(); return day===0?6:day-1; };

  const [weekStart, setWeekStart] = useState(() => getWeekMonday(new Date()));
  const [dayIdx,    setDayIdx]    = useState(todayDayIdx);
  const [person,    setPerson]    = useState("p1");
  const [slot,      setSlot]      = useState("d");
  const [saving,    setSaving]    = useState(false);

  const weekKey = weekStart.toISOString().split("T")[0];
  const weekDays = Array.from({length:7}, (_,i) => { const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });

  async function save() {
    setSaving(true);
    try {
      const snap = await db.collection("mealPlan").doc(weekKey).get();
      const existing = snap.exists ? (snap.data().days || {}) : {};
      const day = {...(existing[dayIdx] || {})};
      const personData = {...(day[person] || {})};
      const cur = personData[slot];
      const arr = Array.isArray(cur) ? [...cur] : (cur ? [cur] : []);
      arr.push({label: item.name, itemId: item.id});
      personData[slot] = arr;
      day[person] = personData;
      existing[dayIdx] = day;
      await db.collection("mealPlan").doc(weekKey).set({weekStart: weekKey, days: existing}, {merge: true});
    } catch(e) { console.warn("Add to meal failed:", e); }
    setSaving(false);
    onClose();
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,marginBottom:4,color:"#BAE6FD"}}>Add to Meal Plan</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:16,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:6}}>Week</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:11}} onClick={()=>{const d=new Date(weekStart);d.setDate(d.getDate()-7);setWeekStart(d);}}>←</button>
            <span style={{fontSize:12,flex:1,textAlign:"center",color:"#BAE6FD"}}>{weekStart.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>
            <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:11}} onClick={()=>{const d=new Date(weekStart);d.setDate(d.getDate()+7);setWeekStart(d);}}>→</button>
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:6}}>Day</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {DAY_NAMES.map((n,i)=>(
              <button key={i} className={`btn ${dayIdx===i?"btn-primary":"btn-ghost"}`} style={{padding:"3px 8px",fontSize:11}} onClick={()=>setDayIdx(i)}>{n}</button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:6}}>Person</div>
          <div style={{display:"flex",gap:8}}>
            <button className={`btn ${person==="p1"?"btn-primary":"btn-ghost"}`} style={{flex:1}} onClick={()=>setPerson("p1")}>{person1Name}</button>
            <button className={`btn ${person==="p2"?"btn-primary":"btn-ghost"}`} style={{flex:1}} onClick={()=>setPerson("p2")}>{person2Name}</button>
          </div>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:6}}>Meal</div>
          <div style={{display:"flex",gap:8}}>
            {SLOTS.map(s=>(
              <button key={s.key} className={`btn ${slot===s.key?"btn-primary":"btn-ghost"}`} style={{flex:1}} onClick={()=>setSlot(s.key)}>{s.label}</button>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save} disabled={saving}>{saving?"…":"Add"}</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function StockWatchPanel({items, FREEZERS, getZone, groupBagCount, groupPortionsCount, openEdit}) {
  const watchedItems = items.filter(it => it.notify);

  function itemPortions(it) {
    const qty = Math.max(1, Number(it.qty)||1);
    return it.totalPortions != null ? Number(it.totalPortions) : (Number(it.bags||1) * qty);
  }

  const seen = new Set();
  const watchList = [];
  for (const item of watchedItems) {
    const key = item.group || item.id;
    if (seen.has(key)) continue;
    seen.add(key);
    if (item.group) {
      const groupItems   = watchedItems.filter(i => i.group === item.group);
      const totalPortions = groupItems.reduce((s,i) => s + itemPortions(i), 0);
      const minPortions   = Math.max(...groupItems.map(i => i.minBags||1));
      watchList.push({ type:"group", key, name:item.group, totalPortions, minPortions, items:groupItems });
    } else {
      watchList.push({ type:"single", key, name:item.name, totalPortions:itemPortions(item), minPortions:item.minBags||1, items:[item] });
    }
  }

  if (watchList.length === 0) return (
    <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.2)",fontSize:12}}>
      <div style={{fontSize:28,marginBottom:10,opacity:.3}}>🔔</div>
      No items on the watch list yet.<br/>
      <span style={{fontSize:11,opacity:.6}}>Turn on "Notify when low" when adding or editing an item.</span>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div className="lbl" style={{color:"rgba(125,211,252,.4)",fontSize:9}}>
          {watchList.length} watched · {watchList.filter(w=>w.totalPortions<=w.minPortions).length} currently low
        </div>
      </div>

      {watchList.map(entry => {
        const isLow   = entry.totalPortions <= entry.minPortions;
        const pct     = Math.min(100, (entry.totalPortions / Math.max(1, entry.minPortions * 2)) * 100);
        const barColor= isLow ? "#F87171" : entry.totalPortions <= entry.minPortions * 1.5 ? "#FB923C" : "#4ADE80";

        return (
          <div key={entry.key} style={{background:"rgba(255,255,255,.04)",border:`1px solid ${isLow?"rgba(248,113,113,.3)":"rgba(125,211,252,.1)"}`,borderRadius:12,padding:"14px 16px"}}>

            {/* Header row */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {entry.type==="group" && <span style={{fontSize:10,color:"rgba(255,255,255,.3)",background:"rgba(255,255,255,.06)",borderRadius:6,padding:"2px 7px"}}>⛓ group</span>}
                <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,color:isLow?"#F87171":"#BAE6FD"}}>{entry.name}</span>
                {isLow && <span className="pulse" style={{fontSize:10,color:"#F87171",background:"rgba(248,113,113,.15)",border:"1px solid rgba(248,113,113,.3)",borderRadius:10,padding:"1px 8px"}}>🔔 LOW</span>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:22,color:barColor,lineHeight:1}}>{entry.totalPortions}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>of {entry.minPortions} portions min</div>
              </div>
            </div>

            {/* Progress bar */}
            <div style={{height:5,background:"rgba(255,255,255,.07)",borderRadius:3,overflow:"hidden",marginBottom:12}}>
              <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:3,transition:"width .3s"}}/>
            </div>

            {/* Individual items in group */}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {entry.items.map(it => {
                const zone = getZone(it.freezer, it.zone);
                const fz   = FREEZERS[it.freezer];
                return (
                  <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:"rgba(0,0,0,.15)",borderRadius:7}}>
                    <span style={{fontSize:11,color:"rgba(255,255,255,.5)",flexShrink:0}}>{fz?.icon} {zone?.label}</span>
                    <span style={{flex:1,fontSize:11,color:"rgba(255,255,255,.7)"}}>{it.name}</span>
                    <span style={{fontSize:11,color:"#7DD3FC",fontWeight:500}}>{itemPortions(it)} portion{itemPortions(it)!==1?"s":""}</span>
                    {it.addedBy && <span style={{fontSize:10,color:"rgba(255,255,255,.25)"}}>👤 {it.addedBy}</span>}
                    {openEdit && (
                      <button className="btn btn-ghost" style={{padding:"2px 8px",fontSize:10}} onClick={()=>openEdit(it)}>edit</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
