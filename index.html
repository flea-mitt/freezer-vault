      {id:"r2",label:"Right · Drawer 2",short:"R · D2",color:"#6EE7B7",bg:"rgba(110,231,183,0.07)"},
      {id:"r3",label:"Right · Drawer 3",short:"R · D3",color:"#34D399",bg:"rgba(52,211,153,0.07)" },

const CATEGORIES = [
  "Cooked Meals","Hob Bags (uncooked)","Slow Cooker Bags","Proteins",

const auth = window.__auth;

const todayStr = () => new Date().toISOString().split("T")[0];

const STORAGE_GUIDE = [
  {keys:["salmon","trout","mackerel","sardine","tuna","herring"],months:3,label:"oily fish",raw:true},
  {keys:["cod","haddock","plaice","sole","pollock","halibut","sea bass","sea bream","tilapia","whiting"],months:6,label:"white fish",raw:true},
  {keys:["prawn","shrimp","scallop","mussel","clam","squid","crab","lobster"],months:3,label:"shellfish",raw:true},
  {keys:["chicken breast","chicken fillet"],months:9,label:"chicken breast",raw:true},
  {keys:["whole chicken","whole turkey"],months:12,label:"whole poultry",raw:true},
  {keys:["chicken","turkey","duck","poultry","hen"],months:9,label:"poultry",raw:true},
  {keys:["beef mince","minced beef","ground beef"],months:4,label:"beef mince",raw:true},
  {keys:["beef","steak","brisket","short rib","oxtail"],months:9,label:"beef",raw:true},
  {keys:["lamb mince","minced lamb"],months:4,label:"lamb mince",raw:true},
  {keys:["lamb","mutton"],months:9,label:"lamb",raw:true},
  {keys:["sausage","banger"],months:2,label:"sausages",raw:true},
  {keys:["bacon","pancetta","lardons"],months:1,label:"bacon/cured pork",raw:true},
  {keys:["pork mince","minced pork"],months:4,label:"pork mince",raw:true},
  {keys:["pork","ham","gammon"],months:6,label:"pork",raw:true},
  {keys:["mince","ground"],months:4,label:"mince",raw:true},
  {keys:["burger","patty"],months:4,label:"burgers",raw:true},
  {keys:["soup","broth","stock","chowder"],months:3,label:"soups & broths"},
  {keys:["curry","stew","casserole","tagine","ragu","bolognese","chilli","chili"],months:3,label:"cooked dishes"},
  {keys:["pasta","lasagne","lasagna","cannelloni"],months:3,label:"cooked pasta dishes"},
  {keys:["rice"],months:1,label:"cooked rice"},
  {keys:["pie","pastry"],months:3,label:"pies"},
  {keys:["bread","loaf","roll","bun","bagel"],months:1,label:"bread"},
  {keys:["spinach","kale","broccoli","cauliflower","pea","bean","sweetcorn","corn","carrot","parsnip","butternut","squash","courgette","pepper","leek","onion","garlic","mushroom"],months:12,label:"vegetables"},
  {keys:["tomato"],months:6,label:"tomatoes"},
  {keys:["berry","strawberr","raspberr","blueberr","blackberr","mango","pineapple","peach","plum","cherry","apple","banana"],months:12,label:"fruit"},
  {keys:["butter"],months:6,label:"butter"},
  {keys:["cheese"],months:6,label:"hard cheese"},
  {keys:["egg"],months:12,label:"eggs (out of shell)"},
  {keys:["milk","cream"],months:3,label:"dairy"},
];

function suggestBestBefore(name, dateFrozen, category) {
  if (!name || name.length < 3) return null;
  const lower = name.toLowerCase();
  const cookedCats = ["Cooked Meals","Soups & Broths","Sauces","Slow Cooker Bags","Cooked Protein"];
  const isCooked = cookedCats.includes(category);
  const isRaw    = category === "Proteins";

  function makeResult(entry, overrideMonths, overrideLabel) {
    const months = overrideMonths ?? entry.months;
    const label  = overrideLabel  ?? entry.label;
    const base = dateFrozen ? new Date(dateFrozen) : new Date();
    base.setMonth(base.getMonth() + months);
    return { dateStr: base.toISOString().split("T")[0], months, label };
  }

  // First pass: find a match that suits the category
  for (const entry of STORAGE_GUIDE) {
    if (!entry.keys.some(k => lower.includes(k))) continue;
    if (isCooked && entry.raw) continue; // skip raw entries for cooked categories
    if (isRaw && !entry.raw) continue;   // skip cooked entries for Proteins
    return makeResult(entry);
  }

  // Fallback for cooked categories: raw protein matched but no cooked entry found — cap at 3 months
  if (isCooked) {
    for (const entry of STORAGE_GUIDE) {
      if (!entry.keys.some(k => lower.includes(k))) continue;
      return makeResult(entry, Math.min(entry.months, 3), `cooked ${entry.label}`);
    }
  }

  return null;
}

const getZone = (fid, zid) => FREEZERS[fid]?.zones.find(z => z.id === zid);

function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d).getTime() - Date.now()) / 86400000);
}
function expiryInfo(bb) {
  const d = daysUntil(bb);
  if (d === null) return null;
  if (d < -14) return {label:"Dispose",                        color:"#F87171",pulse:true};
  if (d < 0)   return {label:`Expired ${Math.abs(d)}d ago`,    color:"#F87171",pulse:true};
  if (d === 0) return {label:"Expires today",                  color:"#F87171",pulse:true};
  if (d <= 14) return {label:"Use this week",                  color:"#FB923C",pulse:true};
  if (d <= 30) return {label:`${d}d left`,                     color:"#FDE68A",pulse:false};
  return             {label:`${d}d left`,                      color:"#4ADE80",pulse:false};
}
function frozenLabel(d) {
  if (!d) return "";
  const days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days === 0) return "frozen today";
  if (days === 1) return "frozen yesterday";
  return `frozen ${days}d ago`;
}
function fmtTime(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}) + " " +
         d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
function getWeekMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  d.setHours(0,0,0,0);
  return d;
}

const INIT = {
  name:"", freezer:"chest", zone:"basket", category:"Cooked Meals",
  bags:1, qty:1, unit:"portions", storage:"box", dateFrozen:todayStr(), bestBefore:"",
  notify:false, minBags:1, group:"",
  calories:"", protein:"", carbs:"", fat:"",
  recipeUrl:"", notes:""
};

function App() {
  const urlParams   = new URLSearchParams(window.location.search);
  const initFreezer = FREEZERS[urlParams.get("freezer")] ? urlParams.get("freezer") : "chest";
  const initZone    = urlParams.get("zone") || null;

  const [authUser,   setAuthUser]  = useState(undefined); // undefined = checking, null = signed out
  const [authMode,   setAuthMode]  = useState(null);      // "owner" | "guest" | null
  const [authError,  setAuthError] = useState("");
  const [signingIn,  setSigningIn] = useState(false);

  // Load owners from Firestore then set up auth listener
  useEffect(() => {
    let authUnsub = null;
    db.collection("config").doc("settings").get()
      .then(snap => {
        const owners = (snap.exists && snap.data().owners) || [];
        authUnsub = auth.onAuthStateChanged(user => {
          setAuthUser(user);
          if (user && owners.includes(user.email)) setAuthMode("owner");
          else if (user) { auth.signOut(); setAuthMode(null); setAuthError("This Google account isn't on the approved list."); }
        });
      })
      .catch(() => {
        authUnsub = auth.onAuthStateChanged(user => { setAuthUser(user || null); });
      });
    return () => { if (authUnsub) authUnsub(); };
  }, []);

  async function signInWithGoogle() {
    setSigningIn(true); setAuthError("");
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch(e) {
      setAuthError(e.code === "auth/popup-closed-by-user" ? "" : "Sign in failed — try again.");
    }
    setSigningIn(false);
  }

  function signOut() { auth.signOut(); setAuthMode(null); }
  function enterGuest() { setAuthMode("guest"); }

  const isOwner = authMode === "owner";
  const isGuest = authMode === "guest";

  const [showScanner, setShowScanner] = useState(false);
  const [scanStatus,  setScanStatus]  = useState("");
  const scannerRef = useRef(null);

  const [items,      setItems]     = useState([]);
  const [dbError,    setDbError]   = useState(null);
  const [loading,    setLoading]   = useState(true);
  const [online,     setOnline]    = useState(navigator.onLine);
  const [syncing,    setSyncing]   = useState(false);
  const [lastUpd,    setLastUpd]   = useState(null);
  const [activeFreezer, setAF]     = useState(initFreezer);
  const [activeZone,    setAZ]     = useState(initZone);
  const [view,       setView]      = useState("map");
  const [kiosk,      setKiosk]     = useState(false);
  const [showForm,   setShowForm]  = useState(false);
  const [form,       setForm]      = useState(INIT);
  const [editId,        setEditId]       = useState(null);
  const [search,        setSearch]       = useState("");
  const [filterCat,     setFilterCat]    = useState("all");
  const [clock,         setClock]        = useState(new Date());
  const [storedCategories, setStoredCategories] = useState(null);
  const [usdaKey,          setUsdaKey]          = useState("");
  const [todoistKey,       setTodoistKey]       = useState("");
  const [todoistProjectId, setTodoistProjectId] = useState("");
  const [todoistWorkerUrl,  setTodoistWorkerUrl]  = useState("");
  const [expiryWebhookUrl, setExpiryWebhookUrl] = useState("");
  const [person1Name,      setPerson1Name]      = useState("Tal");
  const [person2Name,      setPerson2Name]      = useState("Kara");
  const [addToMealTarget,  setAddToMealTarget]  = useState(null);
  const [totalGrams,       setTotalGrams]       = useState("");
  const [converting,       setConverting]       = useState(false);
  const [convertError,     setConvertError]     = useState("");
  const todoistProcessing  = React.useRef(new Set());

  useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    db.collection("config").doc("settings").get()
      .then(snap => { if (snap.exists) {
        if (snap.data().categories)        setStoredCategories(snap.data().categories);
        if (snap.data().usdaKey)           setUsdaKey(snap.data().usdaKey);
        if (snap.data().todoistKey)        setTodoistKey(snap.data().todoistKey);
        if (snap.data().todoistProjectId)  setTodoistProjectId(snap.data().todoistProjectId);
        if (snap.data().todoistWorkerUrl)  setTodoistWorkerUrl(snap.data().todoistWorkerUrl);
        if (snap.data().expiryWebhookUrl) setExpiryWebhookUrl(snap.data().expiryWebhookUrl);
        if (snap.data().person1Name) setPerson1Name(snap.data().person1Name);
        if (snap.data().person2Name) setPerson2Name(snap.data().person2Name);
      }})
      .catch(() => {});
  }, []);

  const allCategories = storedCategories ?? CATEGORIES;

  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on); window.addEventListener("offline", off);
    return () => { window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  }, []);

  async function stopScanner() {
    if (scannerRef.current) {
      try { await scannerRef.current.stop(); } catch(e) {}
      scannerRef.current = null;
    }
    setShowScanner(false);
  }

  useEffect(() => {
    if (!showScanner) return;
    setScanStatus("scanning");
    let cancelled = false;
    const t = setTimeout(async () => {
      try {
        const scanner = new Html5Qrcode("barcode-reader");
        scannerRef.current = scanner;
        await scanner.start(
          {facingMode:"environment"},
          {fps:10, qrbox:{width:240,height:120}},
          async (barcode) => {
            if (cancelled) return;
            try { await scanner.stop(); } catch(e) {}
            scannerRef.current = null;
            setShowScanner(false);
            setScanStatus("looking");
            try {
              const res  = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
              const data = await res.json();
              if (data.status === 1 && data.product) {
                const p     = data.product;
                const brand = (p.brands || "").split(",")[0].trim();
                const name  = p.product_name_en || p.product_name || "";
                const full  = [brand, name].filter(Boolean).join(" — ");
                if (full) { setForm(f => ({...f, name: full})); setScanStatus(""); }
                else setScanStatus("notfound");
              } else setScanStatus("notfound");
            } catch(e) { setScanStatus("error"); }
          },
          () => {}
        );
      } catch(e) { console.error("Scanner:",e); setScanStatus("error"); }
    }, 150);
    return () => {
      cancelled = true; clearTimeout(t);
      if (scannerRef.current) { scannerRef.current.stop().catch(()=>{}); scannerRef.current = null; }
    };
  }, [showScanner]);

  useEffect(() => {
    if (!db) { setDbError("Database not initialised"); setLoading(false); return; }
    const unsub = db.collection("items").onSnapshot(
      snap => {
        const docs = snap.docs.map(d => ({id:d.id,...d.data()}));
        docs.sort((a,b) => (a.createdAt?.toMillis?.()??0) - (b.createdAt?.toMillis?.()??0));
        setItems(docs); setLoading(false);
        if (docs.length > 0) {
          const latest = docs.reduce((a,b) => (b.updatedAt?.toMillis?.()??0) > (a.updatedAt?.toMillis?.()??0) ? b : a);
          setLastUpd(latest.updatedAt ?? null);
        }
      },
      err => { setDbError(err.message); setLoading(false); }
    );
    return () => unsub();
  }, []);

  // Audit log helper
  async function logHistory(action, item, extra={}) {
    try {
      await db.collection("history").add({
        action,
        itemName: item.name || extra.name || "Unknown",
        itemId:   item.id   || "",
        freezer:  item.freezer || "",
        zone:     item.zone    || "",
        category: item.category|| "",
        bags:     item.bags    || 1,
        ...extra,
        performedBy:      authUser?.displayName || "Unknown",
        performedByEmail: authUser?.email       || "",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) { console.warn("History log failed:", e); }
  }

  async function saveItem() {
    if (!form.name.trim()) return;
    setSyncing(true);
    try {
      const bags = Number(form.bags)||1, qty = Number(form.qty)||1;
      const payload = {
        name:form.name, freezer:form.freezer, zone:form.zone, category:form.category,
        bags, qty, unit:form.unit, storage:form.storage||"box",
        totalPortions: bags * qty,
        dateFrozen:form.dateFrozen, bestBefore:form.bestBefore||"",
        notify:form.notify||false, minBags:Number(form.minBags)||1,
        group:form.group||"",
        calories:form.calories||"", protein:form.protein||"",
        carbs:form.carbs||"", fat:form.fat||"",
        recipeUrl:form.recipeUrl||"", notes:form.notes||"",
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      if (editId) {
        await db.collection("items").doc(editId).update(payload);
        await logHistory("edited", payload, {itemId:editId, changes: JSON.stringify(payload)});
      } else {
        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        payload.addedBy = authUser?.displayName || "Unknown";
        payload.addedByEmail = authUser?.email || "";
        const ref = await db.collection("items").add(payload);
        await logHistory("added", payload, {itemId:ref.id});
      }
    } catch(e) { alert("Save failed: " + e.message); }
    setSyncing(false); setShowForm(false); setEditId(null); setForm(INIT);
  }

  async function del(id) {
    setSyncing(true);
    try {
      const snap = await db.collection("items").doc(id).get();
      const item = snap.exists ? {id, ...snap.data()} : {id, name:"Unknown"};
      await db.collection("items").doc(id).delete();
      await logHistory("removed", item);
    } catch(e) {}
    setSyncing(false);
  }

  async function adj(id, delta, it) {
    const qty = Math.max(1, Number(it.qty)||1);
    const currentPortions = it.totalPortions != null ? Number(it.totalPortions) : (Number(it.bags||1) * qty);
    const newPortions = Math.max(0, currentPortions + delta);
    setSyncing(true);
    try {
      const snap = await db.collection("items").doc(id).get();
      const item = snap.exists ? {id, ...snap.data()} : {id, name:"Unknown"};
      if (newPortions === 0) {
        await db.collection("items").doc(id).delete();
        await logHistory("removed", item, {note:"Last portion used"});
      } else {
        const newBags = Math.ceil(newPortions / qty);
        const minThresh = Number(it.minBags||1);
        const wasLow = currentPortions <= minThresh;
        const nowAbove = newPortions > minThresh;
        const nowLow = newPortions <= minThresh && !wasLow;
        const clearTodoist = wasLow && nowAbove && it.todoistAdded ? {todoistAdded:false, todoistTaskId:null} : {};
        if (wasLow && nowAbove) todoistProcessing.current.delete(id);
        // Fire Todoist in parallel — don't wait for listener round-trip
        if (nowLow && it.notify && !it.todoistAdded && !todoistProcessing.current.has(id)) {
          addToTodoist({...it, id});
        }
        await db.collection("items").doc(id).update({totalPortions:newPortions, bags:newBags, updatedAt:firebase.firestore.FieldValue.serverTimestamp(), ...clearTodoist});
        logHistory(delta > 0 ? "portions_added" : "portions_removed", item, {from:currentPortions, to:newPortions});
      }
    } catch(e) {}
    setSyncing(false);
  }

  async function moveItem(id, item, portionsToMove, destFreezer, destZone) {
    setSyncing(true);
    try {
      const qty = Math.max(1, Number(item.qty)||1);
      const currentPortions = item.totalPortions != null ? Number(item.totalPortions) : (Number(item.bags||1) * qty);
      const moveCount = Math.min(portionsToMove, currentPortions);
      const remainingPortions = currentPortions - moveCount;
      const now = firebase.firestore.FieldValue.serverTimestamp();
      if (remainingPortions === 0) {
        await db.collection("items").doc(id).update({freezer:destFreezer, zone:destZone, updatedAt:now});
        await logHistory("moved", item, {from:`${item.freezer}/${item.zone}`, to:`${destFreezer}/${destZone}`, portions:moveCount});
      } else {
        await db.collection("items").doc(id).update({totalPortions:remainingPortions, bags:Math.ceil(remainingPortions/qty), updatedAt:now});
        const {id:_id, ...rest} = item;
        const ref = await db.collection("items").add({...rest, freezer:destFreezer, zone:destZone, totalPortions:moveCount, bags:Math.ceil(moveCount/qty), createdAt:now, updatedAt:now});
        await logHistory("moved", item, {from:`${item.freezer}/${item.zone}`, to:`${destFreezer}/${destZone}`, portions:moveCount, newId:ref.id});
      }
    } catch(e) { alert("Move failed: " + e.message); }
    setSyncing(false);
  }

  async function addToTodoist(item) {
    if (!todoistKey || !todoistWorkerUrl) return;
    todoistProcessing.current.add(item.id);
    try {
      const res = await fetch(todoistWorkerUrl, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({token: todoistKey, name: item.name, projectId: todoistProjectId||""})
      });
      if (!res.ok) {
        const errBody = await res.text().catch(()=>"");
        throw new Error(`HTTP ${res.status}: ${errBody}`);
      }
      const task = await res.json();
      await db.collection("items").doc(item.id).update({todoistAdded:true, todoistTaskId:task.id, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    } catch(e) {
      console.warn("Todoist add failed:", e.message);
      todoistProcessing.current.delete(item.id);
    }
  }

  useEffect(() => {
    if (!todoistKey || !items.length) return;
    const toAdd = items.filter(it =>
      it.notify &&
      itemPortions(it) <= (it.minBags||1) &&
      !it.todoistAdded

    toAdd.forEach(it => {

  useEffect(() => {

    const expiryItems = items

    fetch(`${todoistWorkerUrl.replace(/\/$/,"")}/sync-expiry`, {

  async function convertToPortions() {
    if (!usdaKey || !form.name.trim() || !totalGrams) return;
    setConverting(true); setConvertError("");
    try {
      const query = encodeURIComponent(form.name.trim() + " frozen");
      const res = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${query}&api_key=${usdaKey}&pageSize=10`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const foods = data.foods || [];
      if (!foods.length) { setConvertError("No USDA match found — try a simpler name"); setConverting(false); return; }
      const frozenMatch = foods.find(f=>f.servingSize>0 && /frozen/i.test(f.description));
      const food = frozenMatch || foods.find(f=>f.servingSize>0) || foods[0];
      const s = food.servingSize > 0 ? food.servingSize : 100;
      const portions = Math.round(Number(totalGrams) / s);
      if (portions < 1) { setConvertError(`Too few grams for 1 portion (serving: ${s}g)`); setConverting(false); return; }
      const get = id => (food.foodNutrients||[]).find(n=>n.nutrientId===id)?.value || 0;
      setForm(f=>({...f,
        qty: portions, unit:"portions",
        calories: String(Math.round(get(1008)*s/100)) || "",
        protein:  String(Math.round(get(1003)*s/100*10)/10) || "",
        carbs:    String(Math.round(get(1005)*s/100*10)/10) || "",
        fat:      String(Math.round(get(1004)*s/100*10)/10) || "",
      }));
      setConvertError(`✓ ${food.description} · ${s}g/portion`);
    } catch(e) { setConvertError("Lookup failed: "+e.message); }
    setConverting(false);
  }

      </div>

      {/* FILTERS */}
      {!kiosk && FREEZERS[activeFreezer] && (
        <div style={{padding:"8px 20px",display:"flex",gap:8,flexWrap:"wrap",borderBottom:"1px solid rgba(125,211,252,.04)"}}>
          <input className="inp" placeholder="🔍 Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:165}}/>
          <select className="inp" value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:185}}>
            <option value="all">All Categories</option>
            {allCategories.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      )}

      {/* MAIN */}
      <div style={{padding:kiosk?"20px 24px":"15px 20px",flex:1,overflow:"auto"}}>

        {activeFreezer==="overview" && (
          <OverviewPanel items={items} allExpiring={allExpiring} totalPortions={totalPortions} lowStock={lowStock} expiryInfo={expiryInfo} getZone={getZone} CATEGORIES={allCategories} FREEZERS={FREEZERS} daysUntil={daysUntil}/>
        )}

        {activeFreezer==="stockwatch" && (
          <StockWatchPanel items={items} FREEZERS={FREEZERS} getZone={getZone} groupBagCount={groupBagCount} groupPortionsCount={groupPortionsCount} openEdit={isOwner?openEdit:null}/>
        )}

        {activeFreezer==="priority" && (
          <PriorityPanel items={items} CATEGORIES={allCategories} FREEZERS={FREEZERS} getZone={getZone} expiryInfo={expiryInfo} daysUntil={daysUntil} openEdit={isOwner?openEdit:null} onAddToMeal={isOwner?it=>setAddToMealTarget(it):null}/>
        )}

        {activeFreezer==="history" && (
          <HistoryPanel db={db} FREEZERS={FREEZERS} getZone={getZone}/>
        )}

        {activeFreezer==="admin" && isOwner && (
          <AdminPanel db={db} allCategories={allCategories} setStoredCategories={setStoredCategories} usdaKey={usdaKey} setUsdaKey={setUsdaKey} todoistKey={todoistKey} setTodoistKey={setTodoistKey} todoistProjectId={todoistProjectId} setTodoistProjectId={setTodoistProjectId} todoistWorkerUrl={todoistWorkerUrl} setTodoistWorkerUrl={setTodoistWorkerUrl} expiryWebhookUrl={expiryWebhookUrl} setExpiryWebhookUrl={setExpiryWebhookUrl} person1Name={person1Name} setPerson1Name={setPerson1Name} person2Name={person2Name} setPerson2Name={setPerson2Name}/>
        )}

        {activeFreezer==="mealplan" && (
          <MealPlanPanel db={db} items={items} person1Name={person1Name} person2Name={person2Name} isOwner={isOwner}/>
        )}

        {activeFreezer!=="overview" && activeFreezer!=="priority" && activeFreezer!=="stockwatch" && activeFreezer!=="history" && activeFreezer!=="admin" && activeFreezer!=="mealplan" && view==="map" && (
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            <div style={{flex:"0 0 auto"}}>
              <div className="lbl" style={{color:"rgba(125,211,252,.3)",marginBottom:9,fontSize:9}}>{fz.label} · {activeFreezer==="chest"?"Top View":"Front View"}</div>
              <div style={{border:"2px solid rgba(125,211,252,.18)",borderRadius:14,padding:8,background:"rgba(0,0,0,.2)",width:kiosk?350:290}}>
                {activeFreezer==="chest"
                  ? <ChestMap  fz={fz} zoneItems={zoneItems} zoneExp={zoneExp} activeZone={activeZone} setAZ={setAZ} kiosk={kiosk}/>
                  : <IndoorMap fz={fz} zoneItems={zoneItems} zoneExp={zoneExp} activeZone={activeZone} setAZ={setAZ} kiosk={kiosk}/>}
              </div>
              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:"4px 12px"}}>
                {[["#4ADE80",">30d"],["#FDE68A","7–30d"],["#FB923C","<7d"],["#F87171","expired"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{flex:1,minWidth:220}} className="fadein">
              {panelZone ? (
                <>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,borderRadius:3,background:panelZone.color}}/>
                      <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:kiosk?16:14,color:panelZone.color}}>{panelZone.label}</span>
                      <span style={{fontSize:11,color:"rgba(255,255,255,.28)"}}>{panelItems.length} item{panelItems.length!==1?"s":""}</span>
                    </div>
                    {isOwner && <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>openAdd(activeZone)}>+ Add here</button>}
                  </div>
                  {panelItems.length===0
                    ? <div style={{textAlign:"center",padding:"36px 0",color:"rgba(255,255,255,.18)",fontSize:12,fontStyle:"italic"}}>Empty</div>
                    : <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {panelItems.map(it=><ItemCard key={it.id} item={it} zone={panelZone} kiosk={kiosk} isGreen={activeFreezer==="indoor"} isOwner={isOwner} onEdit={()=>openEdit(it)} onDel={()=>del(it.id)} onAdj={d=>adj(it.id,d,it)} onMove={(p,f,z)=>moveItem(it.id,it,p,f,z)}/>)}
                      </div>}
                </>
              ) : (
                <div style={{textAlign:"center",padding:kiosk?"70px 0":"50px 0",color:"rgba(255,255,255,.16)",fontSize:kiosk?14:12}}>
                  <div style={{fontSize:kiosk?32:24,marginBottom:10,opacity:.3}}>☝️</div>Tap a zone on the map
                </div>
              )}
            </div>
          </div>
        )}

        {activeFreezer!=="overview" && activeFreezer!=="priority" && activeFreezer!=="stockwatch" && activeFreezer!=="history" && activeFreezer!=="admin" && activeFreezer!=="mealplan" && view==="list" && (
          <div>
            {fz.zones.map(zone=>{
              const zi=zoneItems(fz.id,zone.id);
              return (
                <div key={zone.id} style={{marginBottom:22}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:3,background:zone.color,flexShrink:0}}/>
                    <span className="lbl" style={{color:zone.color}}>{zone.label}</span>
                    <div style={{flex:1,height:1,background:`${zone.color}22`,marginLeft:4}}/>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.22)"}}>{zi.length}</span>
                  </div>
                  {zi.length===0
                    ? <div style={{fontSize:11,color:"rgba(255,255,255,.16)",fontStyle:"italic",paddingLeft:18}}>Empty</div>
                    : <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {zi.map(it=><ItemCard key={it.id} item={it} zone={zone} isGreen={activeFreezer==="indoor"} isOwner={isOwner} onEdit={()=>openEdit(it)} onDel={()=>del(it.id)} onAdj={d=>adj(it.id,d,it)} onMove={(p,f,z)=>moveItem(it.id,it,p,f,z)}/>)}
                      </div>}
                </div>
              );
            })}
            {items.filter(it=>it.freezer===activeFreezer).length===0 && (
              <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.18)",fontSize:12}}>No items in this freezer yet</div>
            )}
          </div>
        )}
      </div>

      {/* MODAL */}
      {showForm && isOwner && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget){stopScanner();setShowForm(false);setEditId(null);}}}>
          <div className="modal">
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:16,marginBottom:18,color:"#BAE6FD"}}>{editId?"Edit Item":"Add to Freezer"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>

              <Field label="NAME">
                <input className="inp" placeholder="e.g. Beef Brisket Dump Bag" value={form.name}
                  onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/>
                <button type="button" className="btn btn-ghost" style={{width:"100%",marginTop:6,fontSize:11,padding:"7px"}}
                  onClick={()=>{setScanStatus("");setShowScanner(s=>!s);}}>
                  {showScanner?"✕ Close camera":"📷 Scan barcode"}
                </button>
                {showScanner && (
                  <div style={{marginTop:8,borderRadius:8,overflow:"hidden",background:"#000"}}>
                    <div id="barcode-reader" style={{width:"100%"}}/>
                  </div>
                )}
                {scanStatus==="looking" && <div style={{fontSize:11,color:"#7DD3FC",marginTop:6,display:"flex",alignItems:"center",gap:6}}><span className="spin">↻</span> Looking up barcode…</div>}
                {scanStatus==="notfound" && <div style={{fontSize:11,color:"#FB923C",marginTop:6}}>⚠ Product not found — type name manually</div>}
                {scanStatus==="error"    && <div style={{fontSize:11,color:"#F87171",marginTop:6}}>✕ Camera error — check permissions</div>}
                {form.name && scanStatus==="" && !showScanner && <div style={{fontSize:11,color:"#4ADE80",marginTop:6}}>✓ {form.name}</div>}
              </Field>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="FREEZER">
                  <select className="inp" value={form.freezer} onChange={e=>{const nf=e.target.value;setForm(f=>({...f,freezer:nf,zone:FREEZERS[nf].zones[0].id}));}}>
                    {Object.values(FREEZERS).map(f=><option key={f.id} value={f.id}>{f.icon} {f.label}</option>)}
                  </select>
                </Field>
                <Field label="ZONE">
                  <select className="inp" value={form.zone} onChange={e=>setForm(f=>({...f,zone:e.target.value}))}>
                    {FREEZERS[form.freezer].zones.map(z=><option key={z.id} value={z.id}>{z.label}</option>)}
                  </select>
                </Field>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10}}>
                <Field label="CATEGORY">
                  <select className="inp" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                    {allCategories.map(c=><option key={c}>{c}</option>)}
                  </select>
                </Field>
                <Field label="STORAGE">
                  <select className="inp" value={form.storage||"box"} onChange={e=>setForm(f=>({...f,storage:e.target.value}))}>
                    <option value="box">Box</option>
                    <option value="free">Free</option>
                  </select>
                </Field>
              </div>

              {usdaKey && (
                <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <Field label="TOTAL GRAMS">
                    <input className="inp" type="number" placeholder="e.g. 600" value={totalGrams}
                      onChange={e=>{setTotalGrams(e.target.value);setConvertError("");}}/>
                  </Field>
                  <button type="button" className="btn btn-ghost" style={{marginBottom:1,fontSize:11,whiteSpace:"nowrap"}}
                    onClick={convertToPortions} disabled={converting||!form.name.trim()||!totalGrams}>
                    {converting?<span className="spin">↻</span>:"Convert to portions"}
                  </button>
                </div>
              )}
              {convertError && (
                <div style={{fontSize:11,color:convertError.startsWith("✓")?"#4ADE80":"#F87171",marginTop:-4}}>
                  {convertError}
                </div>
              )}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                <Field label="BAGS"><input className="inp" type="number" min="1" value={form.bags} onChange={e=>setForm(f=>({...f,bags:Number(e.target.value)}))}/></Field>
                <Field label="PORTIONS / BAG"><input className="inp" type="number" min="1" value={form.qty} onChange={e=>setForm(f=>({...f,qty:Number(e.target.value)}))}/></Field>
                <Field label="UNIT"><input className="inp" placeholder="portions / g" value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/></Field>
              </div>
              {(form.bags>1||form.qty>1) && (
                <div style={{fontSize:11,color:"rgba(125,211,252,.5)",marginTop:-4}}>
                  = {form.bags} bag{form.bags!==1?"s":""} × {form.qty} {form.unit} = {form.bags*form.qty} {form.unit} total
                </div>
              )}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="DATE FROZEN">
                  <input className="inp" type="date" value={form.dateFrozen} onChange={e=>setForm(f=>({...f,dateFrozen:e.target.value}))}/>
                </Field>
                <Field label="BEST BEFORE">
                  <input className="inp" type="date" value={form.bestBefore} onChange={e=>setForm(f=>({...f,bestBefore:e.target.value}))}/>
                  {(()=>{
                    const s=suggestBestBefore(form.name,form.dateFrozen,form.category);
                    if(!s||form.bestBefore) return null;
                    return (
                      <div onClick={()=>setForm(f=>({...f,bestBefore:s.dateStr}))}
                        style={{marginTop:6,cursor:"pointer",background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.25)",borderRadius:6,padding:"5px 9px",fontSize:11,color:"#7DD3FC",display:"flex",alignItems:"center",gap:6}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.2)"}
                        onMouseLeave={e=>e.currentTarget.style.background="rgba(56,189,248,.1)"}>
                        <span>💡</span>
                        <span>{s.label} keeps ~{s.months}m → <strong>{new Date(s.dateStr).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</strong></span>
                      </div>
                    );
                  })()}
                </Field>
              </div>

              {form.bestBefore && (()=>{
                const ei=expiryInfo(form.bestBefore);
                return ei?<div style={{background:`${ei.color}18`,border:`1px solid ${ei.color}44`,borderRadius:7,padding:"7px 12px",fontSize:12,color:ei.color}}>{ei.label}</div>:null;
              })()}

              <Field label="NOTES (optional)">
                <input className="inp" placeholder="e.g. ×2 servings, labelled A…" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
              </Field>

              {/* Nutrition */}
              <div style={{borderTop:"1px solid rgba(125,211,252,.08)",paddingTop:12}}>
                <div className="lbl" style={{color:"rgba(125,211,252,.4)",fontSize:9,marginBottom:10}}>Nutrition (per portion, optional)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                  {[["KCAL","calories","e.g. 450"],["PROTEIN","protein","g"],["CARBS","carbs","g"],["FAT","fat","g"]].map(([label,key,ph])=>(
                    <Field key={key} label={label}>
                      <input className="inp" placeholder={ph} value={form[key]}
                        onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}/>
                    </Field>
                  ))}
                </div>
              </div>

              {/* Recipe link */}
              <Field label="RECIPE LINK (optional)">
                <input className="inp" placeholder="https://..." value={form.recipeUrl}
                  onChange={e=>setForm(f=>({...f,recipeUrl:e.target.value}))}/>
              </Field>

              <Field label="ITEM GROUP (optional)">
                <input className="inp" placeholder="e.g. Salmon, Chicken, Beef Mince…" value={form.group}
                  onChange={e=>setForm(f=>({...f,group:e.target.value}))}
                  list="group-suggestions"/>
                <datalist id="group-suggestions">
                  {[...new Set(items.filter(i=>i.group).map(i=>i.group))].sort().map(g=><option key={g} value={g}/>)}
                </datalist>
                <div style={{fontSize:10,color:"rgba(255,255,255,.28)",marginTop:4}}>
                  Groups items together in the overview and for stock alerts
                </div>
              </Field>

              {/* Low stock notification */}
              <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(125,211,252,.1)",borderRadius:8,padding:"12px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:form.notify?10:0}}>
                  <div>
                    <div style={{fontSize:12,color:"#E0F2FE",fontWeight:500}}>🔔 Notify when low on stock</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:2}}>Flag this item for a future low stock alert</div>
                  </div>
                  <div onClick={()=>setForm(f=>({...f,notify:!f.notify}))}
                    style={{width:40,height:22,borderRadius:11,background:form.notify?"#0EA5E9":"rgba(255,255,255,.15)",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:"white",position:"absolute",top:2,left:form.notify?20:2,transition:"left .2s"}}/>
                  </div>
                </div>
                {form.notify && (
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <Field label="ALERT ME WHEN BELOW">
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <input className="inp" type="number" min="1" value={form.minBags}
                          onChange={e=>setForm(f=>({...f,minBags:Number(e.target.value)}))}
                          style={{width:80}}/>
                        <span style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>portion{form.minBags!==1?"s":""} total</span>
                      </div>
                    </Field>
                  </div>
                )}
              </div>

              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button className="btn btn-primary" style={{flex:1,padding:"9px"}} onClick={saveItem}>{editId?"Save Changes":"Add Item"}</button>
                <button className="btn btn-ghost" onClick={()=>{stopScanner();setShowForm(false);setEditId(null);}}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {addToMealTarget && (
        <AddToMealModal db={db} item={addToMealTarget} person1Name={person1Name} person2Name={person2Name} onClose={()=>setAddToMealTarget(null)}/>
      )}
    </div>
  );
}

function ChestMap({fz,zoneItems,zoneExp,activeZone,setAZ,kiosk}) {
  const z=id=>fz.zones.find(z=>z.id===id);
  return (<>
    <div style={{display:"grid",gridTemplateColumns:"1fr 72px",gap:6,marginBottom:6}}>
      <div style={{background:"rgba(255,255,255,.015)",border:"1px dashed rgba(255,255,255,.06)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 0"}}>
        <span style={{fontSize:9,color:"rgba(255,255,255,.13)",letterSpacing:".06em"}}>OPEN</span>
      </div>
      <ZCell zone={z("basket")} count={zoneItems(fz.id,"basket").length} exp={zoneExp(fz.id,"basket")} active={activeZone==="basket"} onClick={()=>setAZ(a=>a==="basket"?null:"basket")} kiosk={kiosk}/>
    </div>
    <div style={{height:1,background:"rgba(125,211,252,.1)",margin:"2px 0 6px"}}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
      <ZCell zone={z("lt")} count={zoneItems(fz.id,"lt").length} exp={zoneExp(fz.id,"lt")} active={activeZone==="lt"} onClick={()=>setAZ(a=>a==="lt"?null:"lt")} kiosk={kiosk}/>
      <ZCell zone={z("rt")} count={zoneItems(fz.id,"rt").length} exp={zoneExp(fz.id,"rt")} active={activeZone==="rt"} onClick={()=>setAZ(a=>a==="rt"?null:"rt")} kiosk={kiosk}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      <ZCell zone={z("lb")} count={zoneItems(fz.id,"lb").length} exp={zoneExp(fz.id,"lb")} active={activeZone==="lb"} onClick={()=>setAZ(a=>a==="lb"?null:"lb")} kiosk={kiosk}/>
      <ZCell zone={z("rb")} count={zoneItems(fz.id,"rb").length} exp={zoneExp(fz.id,"rb")} active={activeZone==="rb"} onClick={()=>setAZ(a=>a==="rb"?null:"rb")} kiosk={kiosk}/>
    </div>
  </>);
}

function IndoorMap({fz,zoneItems,zoneExp,activeZone,setAZ,kiosk}) {
  const rows=[["l1","r1"],["l2","r2"],["l3","r3"],["l4","r4"]];
  const z=id=>fz.zones.find(z=>z.id===id);
  return (<>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:4}}>
      {["LEFT DOOR","RIGHT DOOR"].map(l=>(
        <div key={l} style={{textAlign:"center",fontSize:9,color:"rgba(52,211,153,.38)",letterSpacing:".07em",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,padding:"3px 0"}}>{l}</div>
      ))}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {rows.map(([lid,rid])=>(
        <div key={lid} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <ZCell zone={z(lid)} count={zoneItems(fz.id,lid).length} exp={zoneExp(fz.id,lid)} active={activeZone===lid} onClick={()=>setAZ(a=>a===lid?null:lid)} kiosk={kiosk} isGreen/>
          <ZCell zone={z(rid)} count={zoneItems(fz.id,rid).length} exp={zoneExp(fz.id,rid)} active={activeZone===rid} onClick={()=>setAZ(a=>a===rid?null:rid)} kiosk={kiosk} isGreen/>
        </div>
      ))}
    </div>
  </>);
}

function ZCell({zone,count,active,onClick,exp,kiosk,isGreen}) {
  return (
    <div className={`zcell${active?(isGreen?" zcell-green active":" active"):""}`}
      style={{background:zone.bg,border:`1px solid ${zone.color}28`,padding:kiosk?"11px 12px":"8px 10px",minHeight:kiosk?72:58}}
      onClick={onClick}>
      <div style={{fontSize:9,letterSpacing:".08em",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:zone.color,opacity:.72,marginBottom:5}}>{zone.short}</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:kiosk?26:19,fontWeight:500,color:zone.color,lineHeight:1}}>{count}</span>
        {exp>0 && <span className="pulse" style={{fontSize:9,background:"rgba(251,146,60,.18)",color:"#FB923C",border:"1px solid rgba(251,146,60,.3)",borderRadius:10,padding:"2px 6px",fontWeight:600}}>⚠{exp}</span>}
      </div>
    </div>
  );
}

function ItemCard({item,zone,onEdit,onDel,onAdj,onMove,kiosk,isGreen,isOwner}) {
  const [hover,setHover]=useState(false);
  const ei=expiryInfo(item.bestBefore);
  const qty=Math.max(1,Number(item.qty)||1);
  const totalPortions=item.totalPortions!=null?Number(item.totalPortions):(Number(item.bags||1)*qty);
  const otherFreezer = item.freezer==="chest" ? "indoor" : "chest";
  const [showMove,setShowMove]=useState(false);
  const [movePortions,setMovePortions]=useState(totalPortions);
  const [moveFreezer,setMoveFreezer]=useState(otherFreezer);
  const [moveZone,setMoveZone]=useState(FREEZERS[otherFreezer].zones[0].id);
  return (
    <div className={`icard${isGreen?" icard-green":""}`} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:kiosk?15:13,fontWeight:500,color:"#E0F2FE"}}>{item.name}</span>

            {item.dateFrozen && <><span style={{color:"rgba(255,255,255,.18)",fontSize:10}}>·</span><span style={{fontSize:10,color:"rgba(255,255,255,.28)"}}>{frozenLabel(item.dateFrozen)}</span></>}

function OverviewPanel({items,allExpiring,totalPortions,lowStock,expiryInfo,getZone,CATEGORIES,FREEZERS,daysUntil}) {
  const totalBags=items.reduce((s,i)=>s+Number(i.bags||1),0);
  const freezerStats=Object.values(FREEZERS).map(fz=>{
    const fzItems=items.filter(i=>i.freezer===fz.id);
    return {fz,count:fzItems.length,bags:fzItems.reduce((s,i)=>s+Number(i.bags||1),0),expiring:fzItems.filter(i=>{const d=daysUntil(i.bestBefore);return d!==null&&d>=0&&d<=14;}).length};
  });
  const catCounts = CATEGORIES.map(cat => {
    const catItems = items.filter(i => i.category === cat);
    if (catItems.length === 0) return null;
    // Deduplicate by group — grouped items count as one type
    const seen = new Set();
    let typeCount = 0;
    for (const item of catItems) {
      const key = item.group || item.id;
      if (seen.has(key)) continue;
      seen.add(key);
      typeCount++;
    }
    const portions = catItems.reduce((s,i) => s+(Number(i.bags||1)*Number(i.qty)), 0);
    return { cat, count: typeCount, portions };
  }).filter(Boolean).sort((a,b) => b.count - a.count);

  const mealCats = ["Cooked Meals","Soups & Broths","Hob Bags (uncooked)","Sauces"];
  const cookedPortions  = items.filter(i=>mealCats.includes(i.category)).reduce((s,i)=>s+(Number(i.bags||1)*Number(i.qty||1)),0);
  const proteinPortions = items.filter(i=>i.category==="Proteins").reduce((s,i)=>s+(Number(i.bags||1)*Number(i.qty||1)),0);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        {[
          {label:"Meal Portions",         value:cookedPortions,    sub:"Cooked, soups, hob & sauces", color:"#BAE6FD"},
          {label:"Total Bags",           value:totalBags,          sub:"individual containers",  color:"#BAE6FD"},
          {label:"Protein Portions",     value:proteinPortions,    sub:"Proteins category",      color:"#BAE6FD"},
          {label:"Low Stock",            value:lowStock.length,    sub:"need restocking",        color:lowStock.length>0?"#F87171":"#4ADE80"},
        ].map(({label,value,sub,color})=>(
          <div key={label} style={{background:"rgba(255,255,255,.04)",border:`1px solid ${color==="#F87171"&&value>0?"rgba(248,113,113,.25)":"rgba(125,211,252,.1)"}`,borderRadius:12,padding:"14px 16px"}}>
            <div className="lbl" style={{color:"rgba(125,211,252,.45)",fontSize:9,marginBottom:6}}>{label}</div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:28,color,lineHeight:1}}>{value}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.28)",marginTop:4}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {freezerStats.map(({fz,count,bags,expiring})=>(
          <div key={fz.id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.1)",borderRadius:12,padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:13,color:"#BAE6FD"}}>{fz.icon} {fz.label}</div>
              {expiring>0 && <span className="pulse" style={{fontSize:10,color:"#FB923C",background:"rgba(251,146,60,.15)",border:"1px solid rgba(251,146,60,.3)",borderRadius:10,padding:"2px 8px"}}>⚠ {expiring} expiring</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[["Items",count],["Bags",bags]].map(([l,v])=>(
                <div key={l}><div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginBottom:2}}>{l}</div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:20,color:"#7DD3FC"}}>{v}</div></div>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {fz.zones.map(zone=>{
                const zCount=items.filter(i=>i.freezer===fz.id&&i.zone===zone.id).length;
                if(zCount===0) return null;
                return (
                  <div key={zone.id} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:7,height:7,borderRadius:2,background:zone.color,flexShrink:0}}/>
                    <div style={{flex:1,fontSize:11,color:"rgba(255,255,255,.45)"}}>{zone.label}</div>
                    <div style={{fontSize:11,color:zone.color,fontWeight:500}}>{zCount}</div>
                    <div style={{width:60,height:4,background:"rgba(255,255,255,.06)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",background:zone.color,width:`${Math.min(100,(zCount/Math.max(1,items.filter(i=>i.freezer===fz.id).length))*100)}%`,borderRadius:2,opacity:.7}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>


      {catCounts.length>0 && (
        <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.1)",borderRadius:12,padding:"14px 16px"}}>
          <div className="lbl" style={{color:"rgba(125,211,252,.45)",fontSize:9,marginBottom:12}}>By Category</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {catCounts.map(({cat,count,portions})=>(
              <div key={cat} style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:130,fontSize:11,color:"rgba(255,255,255,.5)",flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cat}</div>
                <div style={{flex:1,height:5,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",background:"linear-gradient(90deg,#0EA5E9,#38BDF8)",width:`${Math.min(100,(count/Math.max(1,...catCounts.map(c=>c.count)))*100)}%`,borderRadius:3}}/>
                </div>
                <div style={{fontSize:11,color:"#7DD3FC",width:20,textAlign:"right",flexShrink:0}}>{count}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.3)",width:90,flexShrink:0}}>{count===1?"type":"types"} · {portions}p</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {items.length===0 && <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.18)",fontSize:12}}>No items in any freezer yet</div>}

      {/* All items by category */}
      {items.length>0 && <CategoryList items={items} CATEGORIES={CATEGORIES} FREEZERS={FREEZERS} getZone={getZone}/>}
    </div>
  );
}

function CategoryList({items, CATEGORIES, FREEZERS, getZone}) {
  const [openCats,  setOpenCats]  = useState({});
  const [openItems, setOpenItems] = useState({});

  function toggleCat(cat)  { setOpenCats(p  => ({...p, [cat]:  !p[cat]}));  }
  function toggleItem(key) { setOpenItems(p => ({...p, [key]: !p[key]})); }

  // Build per-category entries, merging grouped items
  const catEntries = CATEGORIES.map(cat => {
    const catItems = items.filter(i => i.category === cat);
    if (catItems.length === 0) return null;

    const seen    = new Set();
    const entries = [];
    for (const item of catItems) {
      const key = item.group || item.id;
      if (seen.has(key)) continue;
      seen.add(key);
      if (item.group) {
        const grouped = catItems.filter(i => i.group === item.group);
        // also include items in OTHER categories with same group
        const allGrouped = items.filter(i => i.group === item.group);
        const totalBags  = allGrouped.reduce((s,i) => s+(i.bags||1), 0);
        const totalPortions = allGrouped.reduce((s,i) => s+(Number(i.bags||1)*Number(i.qty)), 0);
        entries.push({ key, isGroup:true, name:item.group, totalBags, totalPortions, items:allGrouped });
      } else {
        entries.push({ key, isGroup:false, name:item.name, totalBags:item.bags||1,
          totalPortions:Number(item.bags||1)*Number(item.qty), items:[item] });
      }
    }
    const totalBags = entries.reduce((s,e) => s+e.totalBags, 0);
    return { cat, entries, totalBags };
  }).filter(Boolean);

  return (
    <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.1)",borderRadius:12,padding:"14px 16px"}}>
      <div className="lbl" style={{color:"rgba(125,211,252,.45)",fontSize:9,marginBottom:14}}>All Items by Category</div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {catEntries.map(({cat,entries,totalBags}) => (
          <div key={cat}>
            {/* Category header */}
            <div onClick={()=>toggleCat(cat)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:openCats[cat]?"rgba(125,211,252,.08)":"rgba(255,255,255,.02)",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(125,211,252,.08)"}
              onMouseLeave={e=>e.currentTarget.style.background=openCats[cat]?"rgba(125,211,252,.08)":"rgba(255,255,255,.02)"}>
              <span style={{fontSize:11,color:"rgba(255,255,255,.25)",width:12}}>{openCats[cat]?"▾":"▸"}</span>
              <span style={{flex:1,fontSize:12,color:"#BAE6FD",fontWeight:500}}>{cat}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>{entries.length} {entries.length===1?"item":"items"}</span>
              <span style={{fontSize:11,color:"#7DD3FC",minWidth:40,textAlign:"right"}}>{totalBags} bags</span>
            </div>

            {/* Expanded entries */}
            {openCats[cat] && (
              <div style={{marginLeft:22,marginTop:3,display:"flex",flexDirection:"column",gap:3}}>
                {entries.map(entry => (
                  <div key={entry.key}>
                    {/* Item / group row */}
                    <div onClick={()=>toggleItem(entry.key)}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:7,cursor:"pointer",background:openItems[entry.key]?"rgba(56,189,248,.08)":"transparent",transition:"background .15s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.08)"}
                      onMouseLeave={e=>e.currentTarget.style.background=openItems[entry.key]?"rgba(56,189,248,.08)":"transparent"}>
                      <span style={{fontSize:10,color:"rgba(255,255,255,.2)",width:12}}>{openItems[entry.key]?"▾":"▸"}</span>
                      {entry.isGroup && <span style={{fontSize:9,color:"rgba(125,211,252,.4)",background:"rgba(125,211,252,.08)",borderRadius:4,padding:"1px 5px"}}>⛓</span>}
                      <span style={{flex:1,fontSize:12,color:"#E0F2FE"}}>{entry.name}</span>
                      <span style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>{entry.totalPortions} portions</span>
                      <span style={{fontSize:11,color:"#7DD3FC",minWidth:40,textAlign:"right"}}>{entry.totalBags} bags</span>
                    </div>

                    {/* Location breakdown */}
                    {openItems[entry.key] && (
                      <div style={{marginLeft:20,marginBottom:4,display:"flex",flexDirection:"column",gap:3}}>
                        {entry.items.map(it => {
                          const zone = getZone(it.freezer, it.zone);
                          const fz   = FREEZERS[it.freezer];
                          return (
                            <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"rgba(0,0,0,.15)",borderRadius:6}}>
                              <span style={{fontSize:12}}>{fz?.icon}</span>
                              <span style={{fontSize:11,color:"rgba(255,255,255,.5)",flex:1}}>{fz?.label} · {zone?.label}</span>
                              {entry.isGroup && <span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>{it.name}</span>}
                              <span style={{fontSize:11,color:"#7DD3FC"}}>{it.bags||1} bag{(it.bags||1)!==1?"s":""}</span>
                              {it.qty>1 && <span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>× {it.qty} {it.unit}</span>}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function PriorityPanel({items, CATEGORIES, FREEZERS, getZone, expiryInfo, daysUntil, openEdit, onAddToMeal}) {
  const [timeFilter, setTimeFilter] = useState("30");
  const [catFilter,  setCatFilter]  = useState("all");

  const TIME_OPTIONS = [
    {value:"expired", label:"Expired"},
    {value:"7",       label:"Within 7 days"},
    {value:"30",      label:"Within 30 days"},
    {value:"90",      label:"Within 90 days"},
    {value:"all",     label:"All with best before"},
  ];

  const filtered = items
    .filter(it => {
      if (!it.bestBefore) return false;
      const d = daysUntil(it.bestBefore);
      if (d === null) return false;
      if (timeFilter === "expired") return d < 0;
      if (timeFilter === "all")     return true;
      return d <= Number(timeFilter);
    })
    .filter(it => catFilter === "all" || it.category === catFilter)
    .sort((a,b) => (daysUntil(a.bestBefore)??9999) - (daysUntil(b.bestBefore)??9999));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:700}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <select className="inp" value={timeFilter} onChange={e=>setTimeFilter(e.target.value)} style={{width:155}}>
          {TIME_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
        <select className="inp" value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{width:175}}>
          <option value="all">All Categories</option>
          {CATEGORIES.map(c=><option key={c}>{c}</option>)}
        </select>
        <span style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>{filtered.length} item{filtered.length!==1?"s":""}</span>
      </div>

      {filtered.length === 0 ? (
        <div style={{textAlign:"center",padding:"44px 0",color:"rgba(255,255,255,.2)",fontSize:12}}>
          <div style={{fontSize:28,marginBottom:10,opacity:.3}}>✓</div>
          No items match this filter
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {filtered.map(it => {
            const ei      = expiryInfo(it.bestBefore);
            const zone    = getZone(it.freezer, it.zone);
            const fz      = FREEZERS[it.freezer];
            const qty     = Math.max(1, Number(it.qty)||1);
            const portions= it.totalPortions!=null ? Number(it.totalPortions) : (Number(it.bags||1)*qty);
            return (
              <div key={it.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:"rgba(255,255,255,.04)",border:`1px solid ${ei?ei.color+"28":"rgba(125,211,252,.1)"}`,borderRadius:10,transition:"background .15s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.07)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.04)"}>

                {ei && (
                  <div className={ei.pulse?"pulse":""} style={{flexShrink:0,width:76,textAlign:"center",background:`${ei.color}18`,border:`1px solid ${ei.color}33`,borderRadius:8,padding:"5px 6px"}}>
                    <div style={{fontSize:11,color:ei.color,fontWeight:600,lineHeight:1.3}}>{ei.label}</div>
                  </div>
                )}

                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:"#E0F2FE",fontWeight:500,marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.name}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>{fz?.icon} {zone?.label}</span>
                    <span style={{color:"rgba(255,255,255,.15)",fontSize:10}}>·</span>
                    <span style={{fontSize:10,background:`${zone?.color||"#7DD3FC"}18`,color:zone?.color||"#7DD3FC",borderRadius:10,padding:"1px 7px"}}>{it.category}</span>
                  </div>
                </div>

                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:18,color:"#7DD3FC",lineHeight:1}}>{portions}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>portion{portions!==1?"s":""}</div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                  {onAddToMeal && <button className="btn btn-ghost" style={{padding:"3px 8px",fontSize:10}} onClick={()=>onAddToMeal(it)}>📅 plan</button>}
                  {openEdit && <button className="btn btn-ghost" style={{padding:"3px 8px",fontSize:10}} onClick={()=>openEdit(it)}>edit</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AdminPanel({db, allCategories, setStoredCategories, usdaKey, setUsdaKey, todoistKey, setTodoistKey, todoistProjectId, setTodoistProjectId, todoistWorkerUrl, setTodoistWorkerUrl, expiryWebhookUrl, setExpiryWebhookUrl, person1Name, setPerson1Name, person2Name, setPerson2Name}) {
  const [newCat,        setNewCat]        = useState("");
  const [editIdx,       setEditIdx]       = useState(null);
  const [editVal,       setEditVal]       = useState("");
  const [busy,          setBusy]          = useState(false);
  const [error,         setError]         = useState("");
  const [keyInput,      setKeyInput]      = useState(usdaKey||"");

  const [tdSaving,      setTdSaving]      = useState(false);
  const [tdSaved,       setTdSaved]       = useState(false);
  const [tdProjInput,    setTdProjInput]    = useState(todoistProjectId||"");
  const [tdProjSaved,    setTdProjSaved]    = useState(false);
  const [tdWorkerInput,   setTdWorkerInput]   = useState(todoistWorkerUrl||"");
  const [tdWorkerSaved,   setTdWorkerSaved]   = useState(false);
  const [webhookInput,    setWebhookInput]    = useState(expiryWebhookUrl||"");
  const [webhookSaved,    setWebhookSaved]    = useState(false);
  const [p1Input,         setP1Input]         = useState(person1Name||"");
  const [p2Input,         setP2Input]         = useState(person2Name||"");
  const [namesSaved,      setNamesSaved]      = useState(false);

  async function saveUsdaKey() {
    setKeySaving(true);
    try {
      await db.collection("config").doc("settings").set({usdaKey: keyInput.trim()}, {merge:true});
      setUsdaKey(keyInput.trim()); setKeySaved(true); setTimeout(()=>setKeySaved(false), 2000);
    } catch(e) { setError("Key save failed: " + e.message); }
    setKeySaving(false);
  }

  async function saveTodoistKey() {
    setTdSaving(true);
    try {
      const token = tdInput.trim();
      await db.collection("config").doc("settings").set({todoistKey: token}, {merge:true});
      setTodoistKey(token); setTdSaved(true); setTimeout(()=>setTdSaved(false), 2000);

  async function savePeopleNames() {

  async function persist(updated) {

    const trimmed = newCat.trim();
    if (!trimmed) return;
    if (allCategories.map(c=>c.toLowerCase()).includes(trimmed.toLowerCase())) {

    }
    setBusy(true); setError("");
    try { await persist([...allCategories, trimmed]); setNewCat(""); }

    setBusy(false);
  }

  function startEdit(idx) { setEditIdx(idx); setEditVal(allCategories[idx]); setError(""); }

    const trimmed = editVal.trim();

    try { await persist(updated); setEditIdx(null); setEditVal(""); }

    setBusy(false);
  }
